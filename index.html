<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO Pro Online</title>
    <style>
        :root {
            --bg-color: #f0f0f0; --text-color: #333; --accent: #ff4757;
            --btn-bg: #2f3542; --btn-text: white;
        }
        .dark-mode { --bg-color: #1a1a1a; --text-color: #f1f1f1; --btn-bg: #374151; }
        .colorful-mode { --bg-color: linear-gradient(45deg, #ff4757, #2ecc71, #3498db, #f1c40f); --text-color: #fff; --btn-bg: rgba(0,0,0,0.3); }

        body { background: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; transition: 0.3s; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { text-align: center; width: 95%; max-width: 600px; position: relative; }
        
        /* الديكور */
        .card-decor { margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; }
        .decor-card { width: 50px; height: 75px; border-radius: 8px; border: 3px solid white; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .red-d { background: #ff4757; transform: rotate(-15deg); }
        .black-d { background: #000; transform: rotate(15deg); }

        .uno-card { width: 45px; height: 70px; border-radius: 8px; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; color: white; box-shadow: 0 4px 8px rgba(0,0,0,0.3); cursor: pointer; transition: 0.2s; }
        .uno-card:hover { transform: translateY(-10px); z-index: 5; }
        
        #uno-btn { background: gold; color: black; border: 3px solid white; border-radius: 50%; width: 55px; height: 55px; font-weight: bold; position: fixed; bottom: 20px; right: 20px; display: none; cursor: pointer; animation: pulse 1s infinite; z-index: 100; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .hidden { display: none !important; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; color: #333; width: 85%; max-width: 380px; text-align: center; }
        
        button { padding: 10px 20px; margin: 5px; border: none; border-radius: 25px; background: var(--btn-bg); color: var(--btn-text); cursor: pointer; }
        input { padding: 12px; border-radius: 20px; border: 2px solid var(--accent); text-align: center; margin-bottom: 10px; width: 80%; }
        
        .rules-list { text-align: initial; padding: 10px 20px; font-size: 0.9rem; line-height: 1.6; }
    </style>
</head>
<body class="light-mode" id="body-tag">

    <div id="draw-modal" class="modal">
        <div class="modal-content">
            <h3 id="draw-title">سحبت كرتًا رائعًا!</h3>
            <p id="draw-msg">هل تريد لعبه الآن؟</p>
            <button onclick="confirmDrawn(true)" id="draw-play-btn" style="background:#2ecc71">لعب الكرت</button>
            <button onclick="confirmDrawn(false)" id="draw-skip-btn" style="background:#ff4757">تخطي</button>
        </div>
    </div>

    <div id="rules-modal" class="modal">
        <div class="modal-content">
            <h2 id="rules-modal-title">قواعد اللعبة</h2>
            <div class="rules-list" id="rules-content"></div>
            <button onclick="closeModal('rules-modal')" id="rules-close-btn" style="width:100%">إغلاق</button>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h3 id="settings-modal-title">الإعدادات / Settings</h3>
            <label id="label-lang">اللغة / Language:</label>
            <select id="lang-select" onchange="updateUI()" style="width:100%; padding:10px; margin-bottom:15px;">
                <option value="ar">العربية</option>
                <option value="en">English</option>
            </select>
            <label id="label-theme">المظهر / Theme:</label>
            <select id="theme-select" onchange="updateTheme()" style="width:100%; padding:10px;">
                <option value="light">Light</option>
                <option value="dark">Dark</option>
                <option value="colorful">Colorful</option>
            </select>
            <br><br>
            <button onclick="closeModal('settings-modal')" id="settings-close-btn" style="width:100%">حفظ وإغلاق</button>
        </div>
    </div>

    <div class="container" id="main-screen">
        <div class="card-decor">
            <div class="decor-card red-d">7</div>
            <div class="decor-card black-d">+4</div>
        </div>
        <h1 id="main-title">أونو أونلاين</h1>
        <input type="text" id="username" placeholder="أدخل اسمك">
        <br>
        <button onclick="createRoom()" id="btn-create">إنشاء غرفة</button>
        <br>
        <input type="text" id="room-input" maxlength="6" placeholder="كود الغرفة">
        <button onclick="joinRoom()" id="btn-join">دخول</button>
        <br>
        <button onclick="openModal('rules-modal')" id="btn-rules">قواعد اللعبة</button>
        <button onclick="openModal('settings-modal')" id="btn-settings">الإعدادات ⚙️</button>
    </div>

    <div class="container hidden" id="game-screen">
        <div style="padding: 20px; border: 3px dashed var(--accent); border-radius: 20px; position: relative;">
            <button class="exit-btn" onclick="location.reload()" id="btn-exit">خروج 🚪</button>
            <h3 id="room-display"></h3>
            
            <div id="waiting-area">
                <p id="wait-msg">بإنتظار الخصوم...</p>
                <button id="btn-ready" onclick="setReady()">أنا جاهز! 👍</button>
            </div>

            <div id="game-board" class="hidden">
                <p id="turn-display" style="font-weight:bold; color:var(--accent);"></p>
                <div id="top-card" class="uno-card" style="margin: 0 auto; transform: scale(1.3);">?</div>
                <div id="player-hand" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin-top: 25px;"></div>
                <button onclick="drawCardAction()" id="btn-draw-main">سحب كرت +</button>
            </div>
            
            <button id="uno-btn" onclick="sayUno()">UNO!</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, push, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCTJA6RtmgNDfusmpQH7Yu5keo8LnB_arE",
            authDomain: "uno-online-c4bb2.firebaseapp.com",
            databaseURL: "https://uno-online-c4bb2-default-rtdb.firebaseio.com",
            projectId: "uno-online-c4bb2",
            storageBucket: "uno-online-c4bb2.firebasestorage.app",
            messagingSenderId: "1077724641787",
            appId: "1:1077724641787:web:302acb78b4ee3f9090735e"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const translations = {
            ar: {
                mainTitle: "أونو أونلاين", userPlac: "أدخل اسمك", create: "إنشاء غرفة", join: "دخول الغرفة", roomPlac: "كود الغرفة",
                rules: "قواعد اللعبة", settings: "الإعدادات ⚙️", exit: "خروج 🚪", wait: "بإنتظار الخصوم...", ready: "أنا جاهز! 👍",
                draw: "سحب كرت +", turn: "دورك الآن! 🔥", waitTurn: "انتظر الخصم...", unoAlert: "قل UNO أولاً!",
                saidUno: "لقد قلت UNO! 📢", drawTitle: "سحبت كرتًا رائعًا!", drawMsg: "هل تريد لعبه الآن أم تخطي دورك؟",
                play: "لعب الكرت", skip: "تخطي", close: "إغلاق",
                rulesText: "• 7 كروت لكل لاعب.<br>• طابق اللون أو القيمة.<br>• كرت البداية دائماً رقمي.<br>• اضغط UNO عند بقاء كرتين."
            },
            en: {
                mainTitle: "UNO ONLINE", userPlac: "Enter Name", create: "Create Room", join: "Join Room", roomPlac: "Room Code",
                rules: "Game Rules", settings: "Settings ⚙️", exit: "Exit 🚪", wait: "Waiting for players...", ready: "I'm Ready! 👍",
                draw: "Draw Card +", turn: "Your Turn! 🔥", waitTurn: "Waiting for opponent...", unoAlert: "Say UNO first!",
                saidUno: "You said UNO! 📢", drawTitle: "Lucky Draw!", drawMsg: "Play this card now or skip turn?",
                play: "Play Card", skip: "Skip", close: "Close",
                rulesText: "• 7 cards each.<br>• Match color or value.<br>• Starter card is always a number.<br>• Press UNO when you have 2 cards left."
            }
        };

        let myKey, myRoom, myName, lastCard, hasUno = false;

        window.updateUI = () => {
            const lang = document.getElementById('lang-select').value;
            const t = translations[lang];
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            
            document.getElementById('main-title').innerText = t.mainTitle;
            document.getElementById('username').placeholder = t.userPlac;
            document.getElementById('btn-create').innerText = t.create;
            document.getElementById('btn-join').innerText = t.join;
            document.getElementById('room-input').placeholder = t.roomPlac;
            document.getElementById('btn-rules').innerText = t.rules;
            document.getElementById('btn-settings').innerText = t.settings;
            document.getElementById('btn-exit').innerText = t.exit;
            document.getElementById('wait-msg').innerText = t.wait;
            document.getElementById('btn-ready').innerText = t.ready;
            document.getElementById('btn-draw-main').innerText = t.draw;
            document.getElementById('rules-modal-title').innerText = t.rules;
            document.getElementById('rules-content').innerHTML = t.rulesText;
            document.getElementById('rules-close-btn').innerText = t.close;
            document.getElementById('draw-title').innerText = t.drawTitle;
            document.getElementById('draw-msg').innerText = t.drawMsg;
            document.getElementById('draw-play-btn').innerText = t.play;
            document.getElementById('draw-skip-btn').innerText = t.skip;
        };

        window.createRoom = async () => {
            myName = document.getElementById('username').value || "Player";
            const code = Math.floor(100000 + Math.random() * 900000);
            myRoom = code;
            const pRef = push(ref(db, `rooms/${code}/players`));
            myKey = pRef.key;
            onDisconnect(ref(db, `rooms/${code}`)).remove();
            await set(pRef, { name: myName, ready: false });
            enterGame(code);
        };

        window.joinRoom = async () => {
            const code = document.getElementById('room-input').value;
            myName = document.getElementById('username').value || "Player";
            const snap = await get(ref(db, `rooms/${code}`));
            if(!snap.exists()) return alert("Room not found!");
            myRoom = code;
            const pRef = push(ref(db, `rooms/${code}/players`));
            myKey = pRef.key;
            onDisconnect(ref(db, `rooms/${code}`)).remove();
            await set(pRef, { name: myName, ready: false });
            enterGame(code);
        };

        function enterGame(code) {
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('room-display').innerText = `Room: ${code}`;
            onValue(ref(db, `rooms/${code}`), (s) => {
                const data = s.val(); if(!data) return location.reload();
                const ps = Object.values(data.players || {});
                if(ps.length >= 2 && ps.every(p => p.ready) && !data.game) initLogic(code, Object.keys(data.players));
                if(data.game) render(data.game);
            });
        }

        window.setReady = () => update(ref(db, `rooms/${myRoom}/players/${myKey}`), { ready: true });

        async function initLogic(code, keys) {
            if(keys[0] !== myKey) return;
            let deck = [];
            ['red','blue','green','yellow'].forEach(c => {
                for(let i=0; i<=9; i++) deck.push({color:c, value:i.toString()});
                ['+2', 'Skip', '🔄'].forEach(v => deck.push({color:c, value:v}));
            });
            for(let i=0; i<4; i++) { deck.push({color:'black', value:'Wild'}); deck.push({color:'black', value:'+4'}); }
            deck.sort(() => Math.random() - 0.5);
            let startIdx = deck.findIndex(c => !isNaN(c.value));
            let startC = deck.splice(startIdx, 1)[0];
            let game = { discard: [startC], turn: 0, order: keys, deck: deck };
            keys.forEach(k => game[`hand_${k}`] = deck.splice(0, 7));
            await set(ref(db, `rooms/${code}/game`), game);
        }

        function render(game) {
            document.getElementById('waiting-area').classList.add('hidden');
            document.getElementById('game-board').classList.remove('hidden');
            const lang = document.getElementById('lang-select').value;
            const top = game.discard[game.discard.length-1];
            const topEl = document.getElementById('top-card');
            topEl.innerText = top.value; topEl.style.background = getC(top.color);

            const hand = game[`hand_${myKey}`] || [];
            const handDiv = document.getElementById('player-hand');
            handDiv.innerHTML = "";
            hand.forEach((c, i) => {
                const d = document.createElement('div'); d.className='uno-card'; d.innerText=c.value;
                d.style.background=getC(c.color); d.onclick=() => play(i, game);
                handDiv.appendChild(d);
            });
            const isMyTurn = game.order[game.turn] === myKey;
            document.getElementById('turn-display').innerText = isMyTurn ? translations[lang].turn : translations[lang].waitTurn;
            document.getElementById('uno-btn').style.display = (hand.length === 2 && isMyTurn) ? 'block' : 'none';
        }

        async function play(idx, game) {
            if(game.order[game.turn] !== myKey) return;
            const lang = document.getElementById('lang-select').value;
            const card = game[`hand_${myKey}`][idx];
            const top = game.discard[game.discard.length-1];
            if(card.color === top.color || card.value === top.value || card.color === 'black') {
                if(game[`hand_${myKey}`].length === 2 && !hasUno) return alert(translations[lang].unoAlert);
                game[`hand_${myKey}`].splice(idx, 1);
                game.discard.push(card);
                game.turn = (game.turn + 1) % game.order.length;
                await update(ref(db, `rooms/${myRoom}/game`), game);
            }
        }

        window.drawCardAction = async () => {
            const s = await get(ref(db, `rooms/${myRoom}/game`));
            const game = s.val();
            if(game.order[game.turn] !== myKey) return;
            const c = game.deck.pop();
            const top = game.discard[game.discard.length-1];
            hasUno = false;
            if(c.color === top.color || c.value === top.value || c.color === 'black') {
                lastCard = c; document.getElementById('draw-modal').style.display='flex';
            } else {
                game[`hand_${myKey}`].push(c);
                game.turn = (game.turn + 1) % game.order.length;
                await update(ref(db, `rooms/${myRoom}/game`), game);
            }
        };

        window.confirmDrawn = async (playIt) => {
            const s = await get(ref(db, `rooms/${myRoom}/game`));
            const game = s.val();
            document.getElementById('draw-modal').style.display='none';
            if(playIt) game.discard.push(lastCard); else game[`hand_${myKey}`].push(lastCard);
            game.turn = (game.turn + 1) % game.order.length;
            await update(ref(db, `rooms/${myRoom}/game`), game);
        };

        window.sayUno = () => {
            const lang = document.getElementById('lang-select').value;
            hasUno = true; 
            alert(translations[lang].saidUno); 
        };

        function getC(c) { return {red:'#ff4757', blue:'#3498db', green:'#2ecc71', yellow:'#f1c40f', black:'#000'}[c]; }
        window.openModal = (id) => document.getElementById(id).style.display='flex';
        window.closeModal = (id) => document.getElementById(id).style.display='none';
        window.updateTheme = () => document.getElementById('body-tag').className = document.getElementById('theme-select').value + '-mode';
        
        // تشغيل الترجمة الأولية
        updateUI();
    </script>
</body>
</html>
