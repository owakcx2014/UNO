<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أونو برو - نظام الأصدقاء</title>
    <style>
        :root { --bg-color: #f8f9fa; --text-color: #2d3436; --accent: #ff4757; }
        .dark-mode { --bg-color: #1e272e; --text-color: #ffffff; }
        body { background: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: 0.3s; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { width: 90%; max-width: 500px; text-align: center; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        
        /* البطاقات */
        .uno-card { width: 45px; height: 65px; border-radius: 8px; border: 2px solid #fff; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; color: white; cursor: pointer; margin: 2px; box-shadow: 0 3px 6px rgba(0,0,0,0.2); }
        
        /* الأزرار */
        button { padding: 12px 24px; border: none; border-radius: 30px; background: #2f3542; color: white; cursor: pointer; transition: 0.2s; font-size: 14px; margin: 5px; }
        button:hover { transform: scale(1.05); background: var(--accent); }
        input { padding: 12px; border-radius: 15px; border: 1px solid #ccc; width: 80%; margin-bottom: 10px; text-align: center; }

        /* نظام الأصدقاء */
        #friends-panel { margin-top: 15px; border-top: 1px solid #ccc; padding-top: 10px; font-size: 0.9rem; }
        .friend-item { display: flex; justify-content: space-between; background: rgba(0,0,0,0.05); padding: 5px 15px; border-radius: 10px; margin-bottom: 5px; }
        
        #uno-btn { background: gold; color: #000; font-weight: bold; padding: 10px; border-radius: 50%; display: none; }
    </style>
</head>
<body class="light-mode">

    <div id="login-screen" class="container">
        <h1>🃏 UNO PRO</h1>
        <div id="user-info" class="hidden">
            <p>مرحباً، <span id="display-username" style="font-weight:bold; color:var(--accent)"></span></p>
            <button onclick="showMain()">دخول للردهة</button>
        </div>
        <div id="auth-form">
            <input type="text" id="username-input" placeholder="اختر اسم مستخدم">
            <button onclick="registerUser()">إنشاء حساب</button>
        </div>
    </div>

    <div id="main-screen" class="container hidden">
        <button onclick="openFriends()">👥 الأصدقاء</button>
        <button onclick="createRoom()">إنشاء غرفة</button>
        <br>
        <input type="text" id="room-code-input" placeholder="كود الغرفة">
        <button onclick="joinRoom()">دخول</button>
        
        <div id="friends-panel" class="hidden">
            <h4>قائمة الأصدقاء</h4>
            <div id="friends-list"></div>
            <input type="text" id="friend-id-input" placeholder="ID الصديق">
            <button onclick="addFriend()">إضافة</button>
        </div>
    </div>

    <div id="game-screen" class="container hidden">
        <h3 id="room-id-tag"></h3>
        <p id="turn-info"></p>
        <div id="top-card" class="uno-card" style="transform: scale(1.3); margin-bottom: 20px;">?</div>
        <div id="player-hand"></div>
        <br>
        <button onclick="drawCard()">سحب كرت +</button>
        <button id="uno-btn" onclick="sayUno()">UNO!</button>
        <br>
        <button style="background:red" onclick="location.reload()">انسحاب 🏳️</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, push, update, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCTJA6RtmgNDfusmpQH7Yu5keo8LnB_arE",
            authDomain: "uno-online-c4bb2.firebaseapp.com",
            databaseURL: "https://uno-online-c4bb2-default-rtdb.firebaseio.com",
            projectId: "uno-online-c4bb2",
            storageBucket: "uno-online-c4bb2.firebasestorage.app",
            messagingSenderId: "1077724641787",
            appId: "1:1077724641787:web:302acb78b4ee3f9090735e"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myKey, myName, currentRoom;
        let hasSaidUno = false;

        // --- 1. نظام الحساب ---
        window.registerUser = () => {
            const name = document.getElementById('username-input').value;
            if(!name) return;
            localStorage.setItem('uno_user', name);
            checkUser();
        };

        function checkUser() {
            myName = localStorage.getItem('uno_user');
            if(myName) {
                document.getElementById('auth-form').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('display-username').innerText = myName;
            }
        }
        checkUser();

        window.showMain = () => {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
        };

        // --- 2. نظام الغرف والانسحاب الشامل ---
        window.createRoom = async () => {
            const code = Math.floor(100000 + Math.random() * 900000);
            currentRoom = code;
            const pRef = push(ref(db, `rooms/${code}/players`));
            myKey = pRef.key;
            
            // تفعيل نظام "إذا خرجتُ، احذف الغرفة"
            onDisconnect(ref(db, `rooms/${code}`)).remove();
            
            await set(ref(db, `rooms/${code}/status`), "waiting");
            await set(pRef, { name: myName, ready: true });
            startListening(code);
        };

        window.joinRoom = async () => {
            const code = document.getElementById('room-code-input').value;
            const pRef = push(ref(db, `rooms/${code}/players`));
            myKey = pRef.key;
            currentRoom = code;
            
            onDisconnect(ref(db, `rooms/${code}`)).remove();
            
            await set(pRef, { name: myName, ready: true });
            startListening(code);
        };

        function startListening(code) {
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('room-id-tag').innerText = `غرفة: ${code}`;

            onValue(ref(db, `rooms/${code}`), (snap) => {
                if(!snap.exists()) {
                    alert("انتهت الجلسة لخروج أحد اللاعبين!");
                    location.reload();
                    return;
                }
                const data = snap.val();
                const players = Object.keys(data.players || {});
                if(players.length >= 2 && !data.game) initGameLogic(code, players);
                if(data.game) renderGame(data.game);
            });
        }

        // --- 3. منطق الكروت المميزة ---
        async function initGameLogic(code, playerKeys) {
            if(playerKeys[0] !== myKey) return; 

            let deck = [];
            const colors = ['red','blue','green','yellow'];
            colors.forEach(c => {
                for(let i=0; i<=9; i++) deck.push({color:c, value: i.toString()});
                ['+2', 'Skip', 'Rev'].forEach(a => deck.push({color:c, value: a}));
            });
            for(let i=0; i<4; i++) {
                deck.push({color:'black', value:'Wild'});
                deck.push({color:'black', value:'+4'});
            }
            deck.sort(() => Math.random() - 0.5);

            let firstCardIdx = deck.findIndex(card => !isNaN(card.value));
            let firstCard = deck.splice(firstCardIdx, 1)[0];

            let game = {
                discardPile: [firstCard],
                currentTurnIndex: 0,
                playersOrder: playerKeys,
                deck: deck
            };
            playerKeys.forEach(k => game[`hand_${k}`] = deck.splice(0, 7));
            await update(ref(db, `rooms/${code}/game`), game);
        }

        function renderGame(game) {
            const top = game.discardPile[game.discardPile.length-1];
            const topEl = document.getElementById('top-card');
            topEl.innerText = top.value;
            topEl.style.background = getC(top.color);

            const hand = game[`hand_${myKey}`] || [];
            const handDiv = document.getElementById('player-hand');
            handDiv.innerHTML = "";
            hand.forEach((c, i) => {
                const d = document.createElement('div');
                d.className = 'uno-card'; d.innerText = c.value;
                d.style.background = getC(c.color);
                d.onclick = () => playCard(i, game);
                handDiv.appendChild(d);
            });

            const isMyTurn = game.playersOrder[game.currentTurnIndex] === myKey;
            document.getElementById('turn-info').innerText = isMyTurn ? "دورك الآن! 🔥" : "انتظر الخصم...";
            document.getElementById('uno-btn').style.display = (hand.length === 2 && isMyTurn) ? 'inline-block' : 'none';
        }

        async function playCard(idx, game) {
            if(game.playersOrder[game.currentTurnIndex] !== myKey) return;
            const hand = game[`hand_${myKey}`];
            const card = hand[idx];
            const top = game.discardPile[game.discardPile.length-1];

            if(card.color === top.color || card.value === top.value || card.color === 'black') {
                if(hand.length === 2 && !hasSaidUno) { alert("قل UNO أولاً!"); return; }
                hand.splice(idx, 1);
                game.discardPile.push(card);
                game.currentTurnIndex = (game.currentTurnIndex + 1) % game.playersOrder.length;
                await update(ref(db, `rooms/${currentRoom}/game`), game);
            }
        }

        window.drawCard = async () => {
            const s = await get(ref(db, `rooms/${currentRoom}/game`));
            const game = s.val();
            if(game.playersOrder[game.currentTurnIndex] !== myKey) return;
            game[`hand_${myKey}`].push(game.deck.pop());
            game.currentTurnIndex = (game.currentTurnIndex + 1) % game.playersOrder.length;
            hasSaidUno = false;
            await update(ref(db, `rooms/${currentRoom}/game`), game);
        };

        window.sayUno = () => { hasSaidUno = true; alert("UNO!!! 📢"); };
        function getC(c) { return {red:'#ff4757', blue:'#3498db', green:'#2ecc71', yellow:'#f1c40f', black:'#2d3436'}[c]; }

        // --- 4. نظام الأصدقاء (تخزين محلي) ---
        window.openFriends = () => document.getElementById('friends-panel').classList.toggle('hidden');
        window.addFriend = () => {
            const fid = document.getElementById('friend-id-input').value;
            let friends = JSON.parse(localStorage.getItem('uno_friends') || '[]');
            friends.push(fid);
            localStorage.setItem('uno_friends', JSON.stringify(friends));
            renderFriends();
        };
        function renderFriends() {
            const list = document.getElementById('friends-list');
            list.innerHTML = "";
            let friends = JSON.parse(localStorage.getItem('uno_friends') || '[]');
            friends.forEach(f => list.innerHTML += `<div class="friend-item"><span>👤 ${f}</span></div>`);
        }
        renderFriends();
    </script>
</body>
</html>
