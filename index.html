<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNO Pro - MultiPlayer Fix</title>
    <style>
        :root { --bg: #f8f9fa; --txt: #2d3436; --accent: #ff4757; }
        .dark-mode { --bg: #1a1a1a; --txt: #dfe6e9; }
        body { background: var(--bg); color: var(--txt); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { text-align: center; width: 100%; max-width: 500px; }
        
        .room-info { background: #2d3436; color: gold; padding: 8px; border-radius: 12px; margin-bottom: 10px; font-size: 0.9rem; }
        .players-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin-bottom: 10px; }
        .player-tag { background: #636e72; color: white; padding: 4px 10px; border-radius: 15px; font-size: 0.75rem; transition: 0.3s; }
        .active-turn { background: var(--accent) !important; box-shadow: 0 0 12px var(--accent); transform: scale(1.1); }

        /* منطقة اللعب */
        #game-board { position: relative; padding: 20px; border: 2px solid var(--accent); border-radius: 25px; background: rgba(255,255,255,0.05); }
        .uno-card { width: 50px; height: 75px; border-radius: 8px; border: 2px solid white; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; color: white; margin: 2px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); font-size: 0.9rem; }
        
        /* زر أونو للجوال */
        #uno-btn { background: #f1c40f; color: black; border: 4px solid white; border-radius: 15px; width: 80px; height: 45px; font-weight: bold; cursor: pointer; display: none; margin: 10px auto; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; color: #333; width: 80%; text-align: center; }
        
        button { padding: 10px 18px; border-radius: 20px; border: none; background: #2d3436; color: white; font-weight: bold; cursor: pointer; }
        #chat-msgs { height: 60px; overflow-y: auto; font-size: 0.8rem; text-align: right; background: rgba(0,0,0,0.05); padding: 5px; margin-bottom: 5px; }
    </style>
</head>
<body class="light-mode" id="body-tag">

    <div id="color-modal" class="modal">
        <div class="modal-content">
            <h3>🎨 اختر اللون</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div style="height:50px; background:#ff4757; border-radius:10px;" onclick="pickColor('red')"></div>
                <div style="height:50px; background:#3498db; border-radius:10px;" onclick="pickColor('blue')"></div>
                <div style="height:50px; background:#2ecc71; border-radius:10px;" onclick="pickColor('green')"></div>
                <div style="height:50px; background:#f1c40f; border-radius:10px;" onclick="pickColor('yellow')"></div>
            </div>
        </div>
    </div>

    <div class="container" id="main-screen">
        <h1 style="color:var(--accent)">UNO PRO</h1>
        <input type="text" id="username" placeholder="اسمك" style="padding:10px; border-radius:15px; border:1px solid #ccc; width:70%"><br><br>
        <button onclick="enterRoom('create')">إنشاء غرفة</button>
        <button onclick="enterRoom('join')">دخول برقم</button><br><br>
        <input type="text" id="room-input" placeholder="رقم الغرفة" style="padding:8px; border-radius:10px; width:50%">
    </div>

    <div class="container hidden" id="game-screen">
        <div class="room-info" id="room-display">Room: ---</div>
        <div id="players-tags" class="players-list"></div>
        
        <div id="game-board">
            <div id="admin-controls" style="margin-bottom:10px;"></div>
            <div id="waiting-area"><button onclick="setReady()">أنا جاهز! ✅</button></div>
            
            <div id="play-area" class="hidden">
                <p id="turn-hint" style="font-weight:bold"></p>
                <div id="top-card" class="uno-card" style="transform: scale(1.4); margin-bottom:20px;">?</div>
                <div id="player-hand" style="overflow-x: auto; white-space: nowrap; padding: 10px; min-height:90px;"></div>
                <button onclick="drawCard()" style="background:var(--accent)">سحب كرت +</button>
                <button id="uno-btn" onclick="sayUno()">UNO!</button>
            </div>
        </div>

        <div style="margin-top:10px">
            <div id="chat-msgs"></div>
            <input type="text" id="chat-input" placeholder="دردشة..." style="width:60%; padding:5px;">
            <button onclick="sendMsg()">إرسال</button>
        </div>
        <button onclick="quitGame()" style="margin-top:10px; background:#c0392b; font-size:0.7rem">خروج 🚪</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, push, update, onDisconnect, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCTJA6RtmgNDfusmpQH7Yu5keo8LnB_arE",
            authDomain: "uno-online-c4bb2.firebaseapp.com",
            databaseURL: "https://uno-online-c4bb2-default-rtdb.firebaseio.com",
            projectId: "uno-online-c4bb2",
            storageBucket: "uno-online-c4bb2.firebasestorage.app",
            messagingSenderId: "1077724641787",
            appId: "1:1077724641787:web:302acb78b4ee3f9090735e" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myKey, myRoom, myName, isAdmin = false, hasUno = false, picking = false;

        window.enterRoom = async (type) => {
            myName = document.getElementById('username').value || "لاعب";
            myRoom = type === 'create' ? Math.floor(100000 + Math.random() * 899999) : document.getElementById('room-input').value;
            if(!myRoom) return;

            const roomRef = ref(db, `rooms/${myRoom}/players`);
            const snapshot = await get(roomRef);
            const players = snapshot.val() || {};
            
            // منع تكرار الأسماء
            Object.values(players).forEach(p => { if(p.name === myName) myName += Math.floor(Math.random()*99); });

            const pRef = push(roomRef);
            myKey = pRef.key;
            if(Object.keys(players).length === 0) isAdmin = true;

            await set(pRef, { name: myName, ready: false, isAdmin: isAdmin });
            onDisconnect(ref(db, `rooms/${myRoom}/players/${myKey}`)).remove();
            
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('room-display').innerText = `غرفة: ${myRoom} ${isAdmin ? '(الأدمن)' : ''}`;
            listen();
        };

        function listen() {
            onValue(ref(db, `rooms/${myRoom}`), (s) => {
                const data = s.val(); if(!data) return location.reload();
                const players = data.players || {};
                
                // تحديث قائمة اللاعبين
                const tags = document.getElementById('players-tags'); tags.innerHTML = "";
                const turnKey = data.game ? data.game.order[data.game.turn] : null;
                Object.keys(players).forEach(k => {
                    const active = k === turnKey ? 'active-turn' : '';
                    tags.innerHTML += `<span class="player-tag ${active}">${players[k].name}</span>`;
                });

                if(Object.values(players).length >= 2 && Object.values(players).every(p => p.ready) && !data.game) initGame(Object.keys(players));
                if(data.game) render(data.game);
            });

            onValue(ref(db, `rooms/${myRoom}/chat`), (s) => {
                const msgs = document.getElementById('chat-msgs'); msgs.innerHTML = "";
                if(s.exists()) Object.values(s.val()).forEach(m => msgs.innerHTML += `<div><b>${m.u}:</b> ${m.t}</div>`);
                msgs.scrollTop = msgs.scrollHeight;
            });
        }

        async function initGame(keys) {
            if(!isAdmin) return;
            let deck = [];
            ['red','blue','green','yellow'].forEach(c => {
                for(let i=0; i<=9; i++) deck.push({color:c, value:i.toString()});
                ['+2', 'Skip', '🔄'].forEach(v => deck.push({color:c, value:v}));
            });
            for(let i=0; i<4; i++) { deck.push({color:'black', value:'Wild'}); deck.push({color:'black', value:'+4'}); }
            deck.sort(() => Math.random() - 0.5);
            
            let game = { discard: [deck.find(c => !isNaN(c.value))], turn: 0, order: keys, deck: deck, winner: null };
            keys.forEach(k => game[`hand_${k}`] = deck.splice(0, 7));
            await update(ref(db, `rooms/${myRoom}/game`), game);
        }

        function render(game) {
            if(game.winner) { alert("الفائز: " + game.winner); location.reload(); return; }
            document.getElementById('waiting-area').classList.add('hidden');
            document.getElementById('play-area').classList.remove('hidden');
            
            const top = game.discard[game.discard.length-1];
            const topEl = document.getElementById('top-card');
            topEl.innerText = top.value; topEl.style.background = getC(top.color);

            const hand = game[`hand_${myKey}`] || [];
            const handDiv = document.getElementById('player-hand'); handDiv.innerHTML = "";
            hand.forEach((c, i) => {
                const d = document.createElement('div'); d.className='uno-card'; d.innerText=c.value;
                d.style.background=getC(c.color); d.onclick=() => playCard(i, game);
                handDiv.appendChild(d);
            });

            const isTurn = game.order[game.turn] === myKey;
            document.getElementById('turn-hint').innerText = isTurn ? "دورك الآن! 🔥" : "انتظر دورك...";
            document.getElementById('uno-btn').style.display = (hand.length === 2 && isTurn) ? 'block' : 'none';
        }

        async function playCard(idx, game) {
            if(game.order[game.turn] !== myKey || picking) return;
            const card = game[`hand_${myKey}`][idx];
            const top = game.discard[game.discard.length-1];

            if(card.color === top.color || card.value === top.value || card.color === 'black') {
                if(game[`hand_${myKey}`].length === 2 && !hasUno) return alert("يجب ضغط UNO!");
                
                game[`hand_${myKey}`].splice(idx, 1);
                game.discard.push(card);

                if(game[`hand_${myKey}`].length === 0) { game.winner = myName; return await update(ref(db, `rooms/${myRoom}/game`), game); }

                let nextIdx = (game.turn + 1) % game.order.length;
                let victim = game.order[nextIdx];

                if(card.value === '+2') {
                    for(let i=0; i<2; i++) game[`hand_${victim}`].push(game.deck.pop());
                    game.turn = (nextIdx + 1) % game.order.length;
                } else if(card.value === 'Skip') {
                    game.turn = (nextIdx + 1) % game.order.length;
                } else if(card.value === '🔄') {
                    if(game.order.length === 2) { game.turn = (nextIdx + 1) % game.order.length; }
                    else { 
                        game.order.reverse(); 
                        game.turn = (game.order.indexOf(myKey) + 1) % game.order.length; 
                    }
                } else if(card.color === 'black') {
                    if(card.value === '+4') for(let i=0; i<4; i++) game[`hand_${victim}`].push(game.deck.pop());
                    picking = true; document.getElementById('color-modal').style.display='flex';
                } else { game.turn = nextIdx; }
                
                hasUno = false;
                await update(ref(db, `rooms/${myRoom}/game`), game);
            }
        }

        window.pickColor = async (color) => {
            const s = await get(ref(db, `rooms/${myRoom}/game`));
            const game = s.val();
            game.discard[game.discard.length-1].color = color;
            const lastV = game.discard[game.discard.length-1].value;
            game.turn = (lastV === '+4') ? (game.turn + 2) % game.order.length : (game.turn + 1) % game.order.length;
            picking = false; document.getElementById('color-modal').style.display='none';
            await update(ref(db, `rooms/${myRoom}/game`), game);
        };

        window.drawCard = async () => {
            const s = await get(ref(db, `rooms/${myRoom}/game`));
            const game = s.val(); if(game.order[game.turn] !== myKey) return;
            game[`hand_${myKey}`].push(game.deck.pop());
            game.turn = (game.turn + 1) % game.order.length;
            hasUno = false; await update(ref(db, `rooms/${myRoom}/game`), game);
        };

        window.quitGame = async () => {
            if(isAdmin) { if(confirm("أنت الأدمن، هل تريد إغلاق الغرفة للجميع؟")) await remove(ref(db, `rooms/${myRoom}`)); }
            else { await remove(ref(db, `rooms/${myRoom}/players/${myKey}`)); location.reload(); }
        };

        window.sayUno = () => { hasUno = true; sendMsg("قُلت UNO! 📢"); };
        window.sendMsg = (txt) => {
            const i = document.getElementById('chat-input');
            const msg = txt || i.value;
            if(msg) push(ref(db, `rooms/${myRoom}/chat`), { u: myName, t: msg });
            i.value = "";
        };

        window.setReady = () => update(ref(db, `rooms/${myRoom}/players/${myKey}`), { ready: true });
        function getC(c) { return {red:'#ff4757', blue:'#3498db', green:'#2ecc71', yellow:'#f1c40f', black:'#000'}[c]; }
    </script>
</body>
</html>
