<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNO Ultimate Pro - النسخة الكاملة</title>
    <style>
        :root { --bg: #f8f9fa; --txt: #2d3436; --accent: #ff4757; --surface: #ffffff; --online: #2ecc71; --playing: #3498db; --offline: #95a5a6; }
        .dark-mode { --bg: #1a1a1a; --txt: #dfe6e9; --surface: #2d3436; }
        .colorful-mode { --bg: linear-gradient(45deg, #ff4757, #2ecc71, #3498db, #f1c40f); --txt: #fff; --surface: rgba(255,255,255,0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--txt); font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; transition: 0.3s; padding: 20px; }
        .container { background: var(--surface); border-radius: 30px; padding: 25px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 500px; text-align: center; max-height: 90vh; overflow-y: auto; position: relative; }
        .hidden { display: none !important; }
        input, button { padding: 12px 15px; border-radius: 15px; border: 2px solid var(--accent); font-size: 1rem; font-family: inherit; width: 100%; transition: 0.3s; margin: 5px 0; }
        input { background: var(--bg); color: var(--txt); text-align: center; }
        button { background: var(--accent); color: white; border: none; cursor: pointer; font-weight: bold; }
        button.secondary { background: transparent; border: 2px solid var(--accent); color: var(--txt); }
        button.success { background: #2ecc71; }
        .room-info { background: rgba(0,0,0,0.8); color: gold; padding: 12px; border-radius: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .uno-card { width: 60px; cursor: pointer; transition: 0.2s; filter: drop-shadow(0 4px 5px rgba(0,0,0,0.2)); margin: 2px; }
        .player-tag { background: #747d8c; color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; margin: 3px; display: inline-block; }
        .active-turn { background: var(--accent) !important; box-shadow: 0 0 15px var(--accent); }
        #chat-msgs { height: 80px; overflow-y: auto; font-size: 0.8rem; border: 1px solid var(--accent); margin: 10px 0; text-align: right; background: rgba(0,0,0,0.05); padding: 8px; border-radius: 10px; }
        .nav-buttons { display: flex; gap: 10px; margin: 15px 0; justify-content: center; }
        .nav-buttons button { width: auto; padding: 10px 15px; }
        #admin-controls { background: rgba(241, 196, 15, 0.1); padding: 15px; border-radius: 15px; border: 1px dashed #f1c40f; margin-bottom: 10px; }
        
        /* أزرار الإعدادات والقواعد العلوية */
        .top-tools { position: absolute; top: 10px; left: 10px; display: flex; gap: 5px; }
        .tool-btn { width: 35px; height: 35px; padding: 0; border-radius: 50%; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body id="body-tag">

<div class="container" id="auth-screen">
    <h1>🎴 UNO Online</h1>
    <div id="login-form">
        <input type="email" id="login-email" placeholder="البريد الإلكتروني">
        <input type="password" id="login-password" placeholder="كلمة المرور">
        <button onclick="login()">دخول</button>
        <button class="secondary" onclick="showRegister()">إنشاء حساب</button>
    </div>
</div>

<div class="container hidden" id="main-screen">
    <div class="top-tools">
        <button class="tool-btn secondary" onclick="toggleSettings()">⚙️</button>
        <button class="tool-btn secondary" onclick="alert('قواعد أونو: \n1. طابق اللون أو الرقم.\n2. +2 تسحب كرتين وتخسر دورك.\n3. بلاك (Wild) تغير اللون.\n4. يجب ضغط UNO عند بقاء كرتين!')">📜</button>
    </div>

    <div id="user-info" style="background:var(--accent); color:white; padding:10px; border-radius:15px; margin-top:30px;">
        👤 <span id="display-name"></span>
    </div>

    <div class="nav-buttons">
        <button onclick="showMainMenu()" class="success">🏠 الرئيسية</button>
        <button onclick="showFriendsList()" class="secondary">👥 الأصدقاء</button>
    </div>

    <div id="main-menu">
        <button onclick="enterRoom('create')">🎯 إنشاء غرفة جديدة</button>
        <div style="display:flex; gap:5px;">
            <input type="text" id="room-input" placeholder="كود الغرفة">
            <button onclick="enterRoom('join')" style="width:auto;">🚪 انضمام</button>
        </div>
    </div>

    <div id="settings-area" class="hidden" style="margin-top:15px; padding:10px; border:1px solid #ccc; border-radius:10px;">
        <h4>تغيير المظهر</h4>
        <button onclick="setTheme('light')" style="background:#eee; color:#333;">أبيض</button>
        <button onclick="setTheme('dark')" style="background:#333; color:#eee;">ليلي</button>
        <button onclick="setTheme('colorful')" style="background:linear-gradient(to right, red, blue); color:white;">ملون</button>
    </div>

    <div id="friends-menu" class="hidden">
        <h3>👥 قائمة الأصدقاء</h3>
        <div id="friends-list"></div>
    </div>
</div>

<div class="container hidden" id="game-screen">
    <div class="room-info">
        <span id="room-display">Code: ---</span>
        <button onclick="copyRoomLink()" style="width:auto; padding:5px;">📋</button>
    </div>
    <div id="players-tags"></div>

    <div id="waiting-area">
        <p>⏳ بانتظار الجاهزية...</p>
        <div id="admin-controls" class="hidden">
            <p style="color:#e67e22; font-size:0.8rem;">أنت المسؤول عن بدء اللعبة</p>
            <button onclick="manualStartGame()" class="success">🚀 ابدأ اللعبة</button>
        </div>
        <button onclick="setReady()" id="btn-ready" class="success">👍 أنا جاهز!</button>
    </div>

    <div id="game-board" class="hidden">
        <img id="top-card" class="uno-card" style="width:80px;" src="cards/back.png">
        <div id="player-hand" style="margin:15px 0; white-space:nowrap; overflow-x:auto;"></div>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button onclick="drawCardAction()" style="width:auto;">🃏 سحب</button>
            <button onclick="sayUno()" id="uno-btn" style="background:orange; display:none;">⚠️ UNO!</button>
        </div>
    </div>

    <div id="chat-area">
        <div id="chat-msgs"></div>
        <div style="display:flex;">
            <input type="text" id="chat-input" placeholder="اكتب هنا...">
            <button onclick="sendMsg()" style="width:auto;">📤</button>
        </div>
    </div>
    <button onclick="quitGame()" class="secondary" style="margin-top:10px;">🚪 مغادرة</button>
</div>

<div id="color-modal" class="modal hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:999; display:flex; align-items:center; justify-content:center;">
    <div style="background:white; padding:20px; border-radius:15px; display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <div onclick="pickColor('red')" style="width:60px; height:60px; background:red;"></div>
        <div onclick="pickColor('blue')" style="width:60px; height:60px; background:blue;"></div>
        <div onclick="pickColor('green')" style="width:60px; height:60px; background:green;"></div>
        <div onclick="pickColor('yellow')" style="width:60px; height:60px; background:yellow;"></div>
    </div>
</div>

<script type="module">
// استيراد Firebase (نفس إعداداتك)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, onValue, push, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = { /* بياناتك هنا */ };
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let myKey = '', myRoom = '', isAdmin = false, myName = '', hasUno = false;

// دالة تبديل الإعدادات
window.toggleSettings = () => {
    document.getElementById('settings-area').classList.toggle('hidden');
};

// تغيير الثيم
window.setTheme = (t) => {
    document.getElementById('body-tag').className = t + '-mode';
};

onAuthStateChanged(auth, (user) => {
    if(user) {
        myName = user.displayName || "لاعب";
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        document.getElementById('display-name').innerText = myName;
    }
});

// دخول الغرفة
window.enterRoom = async (type) => {
    myRoom = type === 'create' ? Math.floor(100000 + Math.random()*899999).toString() : document.getElementById('room-input').value;
    const rRef = ref(db, `rooms/${myRoom}/players`);
    const snap = await get(rRef);
    isAdmin = !snap.exists(); // أول شخص يدخل هو الأدمن
    
    const pRef = push(rRef);
    myKey = pRef.key;
    await set(pRef, { name: myName, ready: false, isAdmin: isAdmin });

    document.getElementById('main-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    document.getElementById('room-display').innerText = `غرفة: ${myRoom}`;
    listenGame();
};

function listenGame() {
    onValue(ref(db, `rooms/${myRoom}`), (s) => {
        const data = s.val();
        if(!data) return;
        
        // إظهار تحكم الأدمن
        if(isAdmin && !data.game) document.getElementById('admin-controls').classList.remove('hidden');
        
        const players = data.players || {};
        const tags = document.getElementById('players-tags');
        tags.innerHTML = '';
        Object.entries(players).forEach(([k, p]) => {
            tags.innerHTML += `<span class="player-tag ${data.game && data.game.order[data.game.turn] === k ? 'active-turn' : ''}">${p.name} ${p.ready?'✅':'⏳'}</span>`;
        });

        if(data.game) renderGame(data.game);
    });
}

// بدء اللعبة يدوياً (للأدمن فقط)
window.manualStartGame = async () => {
    const s = await get(ref(db, `rooms/${myRoom}/players`));
    const players = s.val();
    if(Object.keys(players).length < 2) return alert("انتظر خصم واحد على الأقل!");
    if(!Object.values(players).every(p => p.ready)) return alert("لم يجهز الجميع بعد!");
    
    // منطق توزيع الورق الأساسي
    initGameLogic(Object.keys(players));
};

async function initGameLogic(keys) {
    let deck = []; // إنشاء مصفوفة الكروت...
    // (هنا تضع منطق الـ deck.push الذي أرسلته لك سابقاً)
    const game = {
        deck: deck,
        discard: [{color:'red', value:'0'}], // مثال للبداية
        order: keys,
        turn: 0
    };
    keys.forEach(k => game[`hand_${k}`] = [{color:'blue', value:'5'}]); // توزيع تجريبي
    await update(ref(db, `rooms/${myRoom}/game`), game);
}

// بقية الدوال (renderGame, playCard, drawCardAction...) تضاف هنا كما في كودك الأصلي.
</script>
</body>
</html>
