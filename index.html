<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أونو برو - التحديث الاستراتيجي</title>
    <style>
        :root { --bg-color: #f0f0f0; --text-color: #333; --accent: #ff4757; --btn-bg: #2f3542; --btn-text: white; }
        .dark-mode { --bg-color: #1a1a1a; --text-color: #f1f1f1; --btn-bg: #374151; }
        .colorful-mode { --bg-color: linear-gradient(45deg, #ff4757, #2ecc71, #3498db, #f1c40f); --text-color: #fff; --btn-bg: rgba(0,0,0,0.3); }

        body { background: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; transition: 0.3s; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { text-align: center; width: 95%; max-width: 600px; position: relative; }
        
        /* كروت الأونو */
        .uno-card { width: 45px; height: 70px; border-radius: 8px; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; color: white; box-shadow: 0 4px 8px rgba(0,0,0,0.3); cursor: pointer; transition: 0.2s; position: relative; }
        .uno-card:hover { transform: translateY(-10px); z-index: 5; }
        
        /* زر أونو السحري */
        #uno-btn { background: linear-gradient(to bottom, #ff4757, #b33939); color: gold; border: 3px solid white; border-radius: 50%; width: 60px; height: 60px; font-weight: bold; position: fixed; bottom: 20px; right: 20px; display: none; cursor: pointer; animation: pulse 1s infinite; z-index: 100; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .hidden { display: none !important; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; color: #333; text-align: center; width: 280px; }
        
        button { padding: 10px 20px; margin: 5px; border: none; border-radius: 25px; background: var(--btn-bg); color: var(--btn-text); cursor: pointer; }
        input { padding: 10px; border-radius: 20px; border: 2px solid var(--accent); text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body class="light-mode" id="body-tag">

    <div id="draw-decision-modal" class="modal">
        <div class="modal-content">
            <h3>لقد سحبت كرتًا قابلًا للعب!</h3>
            <p>هل تريد استخدامه الآن أم تخطي الدور؟</p>
            <button onclick="confirmPlayDrawnCard(true)" style="background:#2ecc71">لعب الكرت ✅</button>
            <button onclick="confirmPlayDrawnCard(false)" style="background:#ff4757">تخطي الدور ✋</button>
        </div>
    </div>

    <button id="uno-btn" onclick="sayUno()">UNO!</button>

    <div class="container" id="main-screen">
        <h1>أونو أونلاين</h1>
        <input type="text" id="player-name-input" placeholder="اسمك">
        <br>
        <button onclick="createRoom()">إنشاء غرفة</button>
        <button onclick="joinRoom()">دخول</button>
        <input type="text" id="room-id-input" maxlength="6" placeholder="الكود">
    </div>

    <div class="container hidden" id="room-screen">
        <div style="border: 2px solid var(--accent); border-radius: 20px; padding: 20px; position: relative;">
            <button onclick="location.reload()" style="position: absolute; top: -40px; left: 0;">خروج</button>
            <h3 id="room-display"></h3>
            
            <div id="waiting-area">
                <button id="btn-ready" onclick="setReady()">جاهز!</button>
            </div>

            <div id="game-board" class="hidden">
                <p id="turn-msg" style="font-weight:bold;"></p>
                <div id="top-card" class="uno-card" style="margin: 0 auto; transform: scale(1.3);">?</div>
                <div id="player-hand" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin-top: 30px;"></div>
                <br>
                <button id="btn-draw" onclick="drawCardAction()">سحب كرت +</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, push, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // نفس إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyCTJA6RtmgNDfusmpQH7Yu5keo8LnB_arE",
            authDomain: "uno-online-c4bb2.firebaseapp.com",
            databaseURL: "https://uno-online-c4bb2-default-rtdb.firebaseio.com",
            projectId: "uno-online-c4bb2",
            storageBucket: "uno-online-c4bb2.firebasestorage.app",
            messagingSenderId: "1077724641787",
            appId: "1:1077724641787:web:302acb78b4ee3f9090735e"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentPlayerKey, currentRoomCode, playerName;
        let lastDrawnCard = null;
        let hasSaidUno = false;

        // --- الأساسيات ---
        window.createRoom = async () => {
            playerName = document.getElementById('player-name-input').value;
            const code = Math.floor(100000 + Math.random() * 900000);
            currentRoomCode = code;
            const pRef = push(ref(db, `rooms/${code}/players`));
            currentPlayerKey = pRef.key;
            await set(ref(db, `rooms/${code}`), { status: "waiting" });
            await set(pRef, { name: playerName, ready: false });
            setupUI(code);
        };

        window.joinRoom = async () => {
            const code = document.getElementById('room-id-input').value;
            playerName = document.getElementById('player-name-input').value;
            const snap = await get(ref(db, `rooms/${code}`));
            if(snap.exists()){
                currentRoomCode = code;
                const pRef = push(ref(db, `rooms/${code}/players`));
                currentPlayerKey = pRef.key;
                await set(pRef, { name: playerName, ready: false });
                setupUI(code);
            }
        };

        function setupUI(code) {
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('room-screen').classList.remove('hidden');
            document.getElementById('room-display').innerText = `غرفة: ${code}`;
            onValue(ref(db, `rooms/${code}/players`), (s) => {
                const ps = Object.values(s.val() || {});
                if(ps.length >= 2 && ps.every(p => p.ready)) startGame(code);
            });
        }

        window.setReady = () => update(ref(db, `rooms/${currentRoomCode}/players/${currentPlayerKey}`), {ready: true});

        async function startGame(code) {
            const snap = await get(ref(db, `rooms/${code}/players`));
            const keys = Object.keys(snap.val());
            if(keys[0] === currentPlayerKey) {
                let deck = [];
                ['red','blue','green','yellow'].forEach(c => {
                    for(let i=0; i<=9; i++) deck.push({color:c, value:i.toString()});
                });
                deck.sort(() => Math.random() - 0.5);
                let game = { discardPile: [deck.pop()], currentTurnIndex: 0, playersOrder: keys, deck: deck };
                keys.forEach(k => game[`hand_${k}`] = deck.splice(0, 7));
                await set(ref(db, `rooms/${code}/game`), game);
            }
            document.getElementById('waiting-area').classList.add('hidden');
            document.getElementById('game-board').classList.remove('hidden');
            listenGame(code);
        }

        function listenGame(code) {
            onValue(ref(db, `rooms/${code}/game`), (s) => {
                const data = s.val(); if(!data) return;
                const top = data.discardPile[data.discardPile.length-1];
                const topEl = document.getElementById('top-card');
                topEl.innerText = top.value;
                topEl.style.backgroundColor = getC(top.color);

                const hand = data[`hand_${currentPlayerKey}`] || [];
                const handDiv = document.getElementById('player-hand');
                handDiv.innerHTML = "";
                hand.forEach((c, i) => {
                    const d = document.createElement('div'); d.className='uno-card'; d.innerText=c.value;
                    d.style.backgroundColor=getC(c.color);
                    d.onclick = () => playCard(i, data);
                    handDiv.appendChild(d);
                });

                const isMyTurn = data.playersOrder[data.currentTurnIndex] === currentPlayerKey;
                document.getElementById('turn-msg').innerText = isMyTurn ? "دورك الآن! 🔥" : "انتظر اللاعب الآخر...";
                
                // إظهار زر أونو إذا بقي ورقتان فقط
                document.getElementById('uno-btn').style.display = (hand.length === 2 && isMyTurn) ? 'block' : 'none';
                if(hand.length !== 1) hasSaidUno = false; // إعادة الضبط إذا زادت الكروت
            });
        }

        // --- منطق اللعب والسحب المطور ---
        async function playCard(idx, data) {
            if(data.playersOrder[data.currentTurnIndex] !== currentPlayerKey) return;
            const card = data[`hand_${currentPlayerKey}`][idx];
            const top = data.discardPile[data.discardPile.length-1];
            
            if(card.color === top.color || card.value === top.value) {
                const hand = data[`hand_${currentPlayerKey}`];
                
                // فحص قاعدة أونو
                if(hand.length === 2 && !hasSaidUno) {
                    alert("يا بطل! يجب أن تضغط على زر UNO قبل رمي الكرت ما قبل الأخير!");
                    return;
                }

                hand.splice(idx, 1);
                data.discardPile.push(card);
                data.currentTurnIndex = (data.currentTurnIndex + 1) % data.playersOrder.length;
                await update(ref(db, `rooms/${currentRoomCode}/game`), data);
            }
        }

        window.drawCardAction = async () => {
            const s = await get(ref(db, `rooms/${currentRoomCode}/game`));
            const data = s.val();
            if(data.playersOrder[data.currentTurnIndex] !== currentPlayerKey) return;
            
            const card = data.deck.pop();
            const top = data.discardPile[data.discardPile.length-1];
            
            // إلغاء الأونو إذا سحبت
            hasSaidUno = false;

            if(card.color === top.color || card.value === top.value) {
                lastDrawnCard = card;
                document.getElementById('draw-decision-modal').style.display = 'flex';
            } else {
                data[`hand_${currentPlayerKey}`].push(card);
                data.currentTurnIndex = (data.currentTurnIndex + 1) % data.playersOrder.length;
                await update(ref(db, `rooms/${currentRoomCode}/game`), data);
            }
        };

        window.confirmPlayDrawnCard = async (shouldPlay) => {
            const s = await get(ref(db, `rooms/${currentRoomCode}/game`));
            const data = s.val();
            document.getElementById('draw-decision-modal').style.display = 'none';

            if(shouldPlay) {
                data.discardPile.push(lastDrawnCard);
            } else {
                data[`hand_${currentPlayerKey}`].push(lastDrawnCard);
            }
            
            data.currentTurnIndex = (data.currentTurnIndex + 1) % data.playersOrder.length;
            await update(ref(db, `rooms/${currentRoomCode}/game`), data);
            lastDrawnCard = null;
        };

        window.sayUno = () => {
            hasSaidUno = true;
            alert("لقد قلت UNO! 📢");
        };

        function getC(c) { return {red:'#ff4757', blue:'#3498db', green:'#2ecc71', yellow:'#f1c40f'}[c]; }
    </script>
</body>
</html>
