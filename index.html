<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNO Ultimate Pro - Extreme</title>
    <style>
        /* التنسيق الجمالي الذي أرسلته مع تحسينات بسيطة للاستجابة */
        :root { --bg: #f8f9fa; --txt: #2d3436; --accent: #ff4757; }
        .dark-mode { --bg: #1a1a1a; --txt: #dfe6e9; }
        .colorful-mode { --bg: linear-gradient(45deg, #ff4757, #2ecc71, #3498db, #f1c40f); --txt: #fff; }

        body { background: var(--bg); color: var(--txt); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; transition: 0.3s; }
        .container { text-align: center; width: 95%; max-width: 550px; position: relative; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 30px; backdrop-filter: blur(5px); }

        .card-view-img { width: 70px; height: auto; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 2px solid white; }
        .room-info { background: rgba(0,0,0,0.8); color: gold; padding: 10px; border-radius: 15px; margin-bottom: 10px; font-weight: bold; display: flex; justify-content: center; align-items: center; gap: 10px; }
        
        .uno-card { width: 65px; height: auto; cursor: pointer; transition: 0.2s; filter: drop-shadow(0 4px 5px rgba(0,0,0,0.2)); margin: 2px; }
        .uno-card:hover { transform: translateY(-15px) scale(1.1); z-index: 10; }

        #uno-btn { background: #f1c40f; color: black; border: 4px solid white; border-radius: 15px; width: 100px; height: 50px; font-weight: bold; font-size: 1.2rem; cursor: pointer; display: none; margin: 10px auto; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; color: #333; width: 85%; max-width: 400px; text-align: center; }

        button { padding: 10px 20px; margin: 5px; border: none; border-radius: 25px; background: #2f3542; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { transform: scale(1.05); opacity: 0.9; }
        input { padding: 12px; border-radius: 20px; border: 2px solid var(--accent); text-align: center; width: 80%; margin-bottom: 10px; outline: none; }

        #chat-msgs { height: 70px; overflow-y: auto; font-size: 0.8rem; border-bottom: 1px solid #ddd; margin-bottom: 5px; text-align: right; background: rgba(0,0,0,0.05); padding: 5px; }
        .player-tag { background: #747d8c; color: white; padding: 5px 12px; border-radius: 15px; font-size: 0.75rem; margin: 3px; display: inline-block; }
        .active-turn { background: var(--accent) !important; box-shadow: 0 0 15px var(--accent); transform: scale(1.1); font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="light-mode" id="body-tag">

    <div id="color-modal" class="modal">
        <div class="modal-content">
            <h3 id="cp-title">اختر اللون الجديد</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div style="height:60px; background:#ff4757; border-radius:10px; cursor:pointer" onclick="pickColor('red')"></div>
                <div style="height:60px; background:#3498db; border-radius:10px; cursor:pointer" onclick="pickColor('blue')"></div>
                <div style="height:60px; background:#2ecc71; border-radius:10px; cursor:pointer" onclick="pickColor('green')"></div>
                <div style="height:60px; background:#f1c40f; border-radius:10px; cursor:pointer" onclick="pickColor('yellow')"></div>
            </div>
        </div>
    </div>

    <div class="container" id="main-screen">
        <div class="decor-box" style="display:flex; justify-content:center; gap:10px; margin-bottom:15px;">
            <img src="cards/r7.png" class="card-view-img" style="transform: rotate(-10deg);">
            <img src="cards/+4.png" class="card-view-img" style="transform: rotate(10deg);">
        </div>
        <h1 id="main-title">أونو أونلاين</h1>
        <input type="text" id="username" placeholder="اسمك المستعار">
        <button onclick="enterRoom('create')" id="btn-create" style="background: var(--accent)">إنشاء غرفة</button>
        <br>
        <input type="text" id="room-input" maxlength="6" placeholder="كود الغرفة">
        <button onclick="enterRoom('join')" id="btn-join">انضمام</button>
        <div style="margin-top: 20px;">
            <button onclick="openModal('rules-modal')" id="btn-rules">قواعد اللعبة</button>
            <button onclick="openModal('settings-modal')">⚙️</button>
        </div>
    </div>

    <div class="container hidden" id="game-screen">
        <div class="room-info">
            <span id="room-display">Code: ---</span>
            <button class="copy-btn" onclick="copyRoomLink()" id="btn-copy">نسخ الرابط 🔗</button>
        </div>
        
        <div style="padding: 15px; border: 2px solid var(--accent); border-radius: 20px; background: rgba(255,255,255,0.85); color: #333;">
            <div id="players-tags"></div>

            <div id="waiting-area">
                <p id="wait-msg">بانتظار جاهزية الجميع...</p>
                <button onclick="setReady()" id="btn-ready" style="background:var(--accent)">أنا جاهز! 👍</button>
            </div>

            <div id="game-board" class="hidden">
                <p id="turn-display" style="font-weight:bold; color: var(--accent);"></p>
                <img id="top-card" class="uno-card" style="margin: 0 auto 15px; transform: scale(1.4); cursor: default;">
                <div id="player-hand" style="overflow-x: auto; white-space: nowrap; padding: 15px; min-height:110px; border-top: 1px solid #ddd;"></div>
                <div style="display:flex; gap:10px; justify-content:center;">
                    <button onclick="drawCardAction()" id="btn-draw" style="background:#2ecc71">سحب كرت +</button>
                    <button id="uno-btn" onclick="sayUno()">UNO!</button>
                </div>
            </div>

            <div style="margin-top:15px">
                <div id="chat-msgs"></div>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="chat-input" style="flex-grow:1; margin:0; padding:8px; border-radius:10px;" placeholder="اكتب هنا...">
                    <button onclick="sendMsg()" id="btn-send" style="padding:5px 15px;">إرسال</button>
                </div>
            </div>
        </div>
        <button onclick="quitGame()" id="btn-quit" style="margin-top:15px; background:#c0392b; width:100px;">خروج 🚪</button>
    </div>

    <script type="module">
        // منطق الـ Firebase والتحكم (Controller) المطور
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, push, update, onDisconnect, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCTJA6RtmgNDfusmpQH7Yu5keo8LnB_arE",
            databaseURL: "https://uno-online-c4bb2-default-rtdb.firebaseio.com",
            projectId: "uno-online-c4bb2"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myKey, myRoom, myName, isAdmin = false, hasUno = false, picking = false;

        // وظائف الواجهة والتحكم
        window.getCardImgPath = (card) => {
            const path = "cards/";
            if (card.value === '+4') return path + "+4.png";
            if (card.value === 'Wild') return path + "wild.png";
            let cMap = { 'red': 'r', 'blue': 'b', 'green': 'g', 'yellow': 'y' };
            let vMap = { 'Skip': 's', '🔄': 'r', '+2': '+2' };
            return `${path}${cMap[card.color] || card.color}${vMap[card.value] || card.value}.png`;
        };

        window.enterRoom = async (type) => {
            myName = document.getElementById('username').value || "لاعب " + Math.floor(Math.random()*99);
            myRoom = type === 'create' ? Math.floor(100000 + Math.random() * 899999) : document.getElementById('room-input').value;
            if(!myRoom) return alert("أدخل كود الغرفة!");

            const roomRef = ref(db, `rooms/${myRoom}/players`);
            const snap = await get(roomRef);
            isAdmin = !snap.exists();

            const pRef = push(roomRef);
            myKey = pRef.key;
            await set(pRef, { name: myName, ready: false, isAdmin: isAdmin });
            onDisconnect(ref(db, `rooms/${myRoom}/players/${myKey}`)).remove();

            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('room-display').innerText = `غرفة: ${myRoom}`;
            listen();
        };

        function listen() {
            onValue(ref(db, `rooms/${myRoom}`), (s) => {
                const data = s.val(); if(!data) return;
                const players = data.players || {};
                
                // عرض اللاعبين
                const tags = document.getElementById('players-tags'); tags.innerHTML = "";
                const turnKey = data.game ? data.game.order[data.game.turn] : null;
                Object.keys(players).forEach(k => {
                    const active = k === turnKey ? 'active-turn' : '';
                    const count = data.game ? ` (${data.game['hand_'+k].length})` : "";
                    tags.innerHTML += `<span class="player-tag ${active}">${players[k].name}${count}</span>`;
                });

                // بدء اللعبة تلقائياً للأدمن
                if(isAdmin && !data.game && Object.keys(players).length >= 2 && Object.values(players).every(p => p.ready)) {
                    initGame(Object.keys(players));
                }
                if(data.game) render(data.game);
            });

            onValue(ref(db, `rooms/${myRoom}/chat`), (s) => {
                const msgs = document.getElementById('chat-msgs'); msgs.innerHTML = "";
                if(s.exists()) Object.values(s.val()).forEach(m => msgs.innerHTML += `<div><b>${m.u}:</b> ${m.t}</div>`);
                msgs.scrollTop = msgs.scrollHeight;
            });
        }

        async function initGame(keys) {
            let deck = [];
            ['red','blue','green','yellow'].forEach(c => {
                for(let i=0; i<=9; i++) deck.push({color:c, value:i.toString()});
                ['+2', 'Skip', '🔄'].forEach(v => deck.push({color:c, value:v}));
            });
            for(let i=0; i<4; i++) { deck.push({color:'black', value:'Wild'}); deck.push({color:'black', value:'+4'}); }
            deck.sort(() => Math.random() - 0.5);

            let game = { discard: [deck.find(c => !isNaN(c.value))], turn: 0, order: keys, deck: deck, direction: 1 };
            keys.forEach(k => game[`hand_${k}`] = deck.splice(0, 7));
            await update(ref(db, `rooms/${myRoom}/game`), game);
        }

        function render(game) {
            document.getElementById('waiting-area').classList.add('hidden');
            document.getElementById('game-board').classList.remove('hidden');
            
            const top = game.discard[game.discard.length-1];
            document.getElementById('top-card').src = getCardImgPath(top);

            const hand = game[`hand_${myKey}`] || [];
            const handDiv = document.getElementById('player-hand'); handDiv.innerHTML = "";
            hand.forEach((c, i) => {
                const img = document.createElement('img');
                img.className = 'uno-card';
                img.src = getCardImgPath(c);
                img.onclick = () => playCard(i, game);
                handDiv.appendChild(img);
            });

            const isTurn = game.order[game.turn] === myKey;
            document.getElementById('turn-display').innerText = isTurn ? "دورك الآن! 🔥" : "انتظر دور الخصم...";
            document.getElementById('uno-btn').style.display = (hand.length === 2 && isTurn) ? 'block' : 'none';
        }

        async function playCard(idx, game) {
            if(game.order[game.turn] !== myKey || picking) return;
            const card = game[`hand_${myKey}`][idx];
            const top = game.discard[game.discard.length-1];

            if(card.color === top.color || card.value === top.value || card.color === 'black') {
                if(game[`hand_${myKey}`].length === 2 && !hasUno) return alert("اضغط UNO أولاً!");
                
                game[`hand_${myKey}`].splice(idx, 1);
                game.discard.push(card);

                if(game[`hand_${myKey}`].length === 0) {
                    alert("لقد فزت! 🎉");
                    return await remove(ref(db, `rooms/${myRoom}`));
                }

                // منطق الأكشن
                let step = game.direction || 1;
                if(card.value === 'Skip') step = 2;
                if(card.value === '🔄') { 
                    if(game.order.length === 2) step = 2; // في لاعبين تعمل مثل Skip
                    else { game.direction *= -1; step = game.direction; }
                }
                
                if(card.color === 'black') {
                    picking = true;
                    document.getElementById('color-modal').style.display = 'flex';
                    // تحديث مؤقت للديسكارد قبل اختيار اللون
                    await update(ref(db, `rooms/${myRoom}/game`), game);
                } else {
                    if(card.value === '+2') {
                        let nextP = game.order[(game.turn + 1) % game.order.length];
                        for(let i=0; i<2; i++) game[`hand_${nextP}`].push(game.deck.pop());
                        step = 2;
                    }
                    game.turn = (game.turn + step + game.order.length) % game.order.length;
                    hasUno = false;
                    await update(ref(db, `rooms/${myRoom}/game`), game);
                }
            }
        }

        window.pickColor = async (color) => {
            const s = await get(ref(db, `rooms/${myRoom}/game`));
            const game = s.val();
            const lastCard = game.discard[game.discard.length-1];
            
            game.discard[game.discard.length-1].color = color;
            let step = (lastCard.value === '+4') ? 2 : 1;
            
            if(lastCard.value === '+4') {
                let nextP = game.order[(game.turn + 1) % game.order.length];
                for(let i=0; i<4; i++) game[`hand_${nextP}`].push(game.deck.pop());
            }

            game.turn = (game.turn + (step * (game.direction || 1)) + game.order.length) % game.order.length;
            picking = false;
            document.getElementById('color-modal').style.display = 'none';
            await update(ref(db, `rooms/${myRoom}/game`), game);
        };

        window.drawCardAction = async () => {
            const s = await get(ref(db, `rooms/${myRoom}/game`));
            const game = s.val();
            if(game.order[game.turn] !== myKey) return;

            game[`hand_${myKey}`].push(game.deck.pop());
            game.turn = (game.turn + 1) % game.order.length;
            hasUno = false;
            await update(ref(db, `rooms/${myRoom}/game`), game);
        };

        // باقي الدوال (sayUno, sendMsg, setReady, copyRoomLink) كما هي في كودك...
        window.setReady = () => update(ref(db, `rooms/${myRoom}/players/${myKey}`), { ready: true });
        window.sayUno = () => { hasUno = true; window.sendMsg("قُلت UNO! 📢"); };
        window.sendMsg = (txt) => {
            const i = document.getElementById('chat-input');
            const msg = txt || i.value;
            if(msg) push(ref(db, `rooms/${myRoom}/chat`), { u: myName, t: msg });
            i.value = "";
        };
        window.openModal = (id) => document.getElementById(id).style.display='flex';
        window.closeModal = (id) => document.getElementById(id).style.display='none';
        window.copyRoomLink = () => {
            navigator.clipboard.writeText(window.location.href).then(() => alert("تم نسخ الرابط!"));
        };
        window.quitGame = () => location.reload();
    </script>
</body>
</html>
