<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNO Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode" id="body-tag">

    <div id="color-modal" class="modal">
        <div class="modal-content">
            <h3>اختر اللون الجديد</h3>
            <div class="color-grid">
                <div class="color-box red" onclick="pickColor('red')"></div>
                <div class="color-box blue" onclick="pickColor('blue')"></div>
                <div class="color-box green" onclick="pickColor('green')"></div>
                <div class="color-box yellow" onclick="pickColor('yellow')"></div>
            </div>
        </div>
    </div>

    <div id="main-screen" class="container">
        <h1>أونو أونلاين</h1>
        <div class="input-group">
            <input type="text" id="username" placeholder="اسمك المستعار">
            <button onclick="Game.enterRoom('create')">إنشاء غرفة جديدة</button>
            <hr>
            <input type="text" id="room-input" placeholder="أدخل كود الغرفة">
            <button onclick="Game.enterRoom('join')">انضمام للعب</button>
        </div>
    </div>

    <div id="game-screen" class="container hidden">
        <div class="room-header">
            <span id="room-display">الغرفة: ---</span>
            <button onclick="Game.copyLink()">نسخ الرابط 🔗</button>
        </div>

        <div class="game-area">
            <div id="players-list" class="players-grid"></div>

            <div id="board" class="hidden">
                <div id="status-msg"></div>
                <div class="discard-pile">
                    <img id="top-card" src="" alt="الورقة الحالية">
                </div>
                <div id="hand" class="player-hand"></div>
                <div class="controls">
                    <button id="draw-btn" onclick="Game.drawCard()">سحب ورقة +</button>
                    <button id="uno-btn" onclick="Game.sayUno()">UNO!</button>
                </div>
            </div>

            <div id="waiting-msg">بانتظار جاهزية جميع اللاعبين...</div>
            <button id="ready-btn" onclick="Game.setReady()">أنا جاهز! 👍</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
