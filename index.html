<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO Ultimate - Room Code Fixed</title>
    <style>
        :root { --bg: #f8f9fa; --txt: #2d3436; --accent: #ff4757; }
        .dark-mode { --bg: #2d3436; --txt: #dfe6e9; }
        body { background: var(--bg); color: var(--txt); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; transition: 0.3s; }
        .container { text-align: center; width: 95%; max-width: 550px; position: relative; }
        
        /* شريط معلومات الغرفة */
        .room-info { background: #2f3542; color: white; padding: 10px; border-radius: 15px; margin-bottom: 15px; font-weight: bold; border: 2px solid gold; }
        
        .uno-card { width: 45px; height: 70px; border-radius: 8px; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; color: white; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .uno-card:hover { transform: translateY(-10px); z-index: 10; border-color: gold; }
        
        #uno-btn { background: #f1c40f; color: black; border: 3px solid white; border-radius: 50%; width: 55px; height: 55px; font-weight: bold; position: fixed; bottom: 85px; right: 20px; display: none; cursor: pointer; animation: pulse 1s infinite; z-index: 100; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .hidden { display: none !important; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; color: #333; width: 85%; max-width: 380px; text-align: center; }
        
        button { padding: 10px 20px; margin: 5px; border: none; border-radius: 25px; background: #2f3542; color: white; cursor: pointer; font-weight: bold; }
        input { padding: 12px; border-radius: 20px; border: 2px solid var(--accent); text-align: center; width: 80%; margin-bottom: 10px; }
        
        #chat-area { background: rgba(0,0,0,0.05); border-radius: 15px; padding: 10px; margin-top: 15px; }
        #chat-msgs { height: 60px; overflow-y: auto; font-size: 0.8rem; border-bottom: 1px solid #ccc; margin-bottom: 5px; }
        .player-tag { background: #747d8c; color: white; padding: 3px 10px; border-radius: 10px; font-size: 0.7rem; margin: 2px; display: inline-block; }
        .active-turn { background: var(--accent) !important; transform: scale(1.1); }
    </style>
</head>
<body class="light-mode" id="body-tag">

    <div id="color-modal" class="modal">
        <div class="modal-content">
            <h3>اختر اللون الجديد 🎨</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                <div style="height:45px; background:#ff4757; border-radius:10px; cursor:pointer" onclick="pickColor('red')"></div>
                <div style="height:45px; background:#3498db; border-radius:10px; cursor:pointer" onclick="pickColor('blue')"></div>
                <div style="height:45px; background:#2ecc71; border-radius:10px; cursor:pointer" onclick="pickColor('green')"></div>
                <div style="height:45px; background:#f1c40f; border-radius:10px; cursor:pointer" onclick="pickColor('yellow')"></div>
            </div>
        </div>
    </div>

    <div class="container" id="main-screen">
        <h1>أونو أونلاين</h1>
        <input type="text" id="username" placeholder="اسمك">
        <button onclick="createRoom()">إنشاء غرفة</button>
        <br>
        <input type="text" id="room-input" maxlength="6" placeholder="كود الغرفة">
        <button onclick="joinRoom()">دخول</button>
        <div style="margin-top: 15px;">
            <button onclick="openModal('settings-modal')">⚙️ الإعدادات</button>
        </div>
    </div>

    <div class="container hidden" id="game-screen">
        <div class="room-info" id="room-display">كود الغرفة: ......</div>
        
        <div style="padding: 15px; border: 2px solid var(--accent); border-radius: 20px; background: rgba(255,255,255,0.05);">
            <button style="position:absolute; top:-40px; left:0;" onclick="location.reload()">خروج 🚪</button>
            <div id="players-tags"></div>
            
            <div id="waiting-area">
                <p>بانتظار الخصوم...</p>
                <button onclick="setReady()">أنا جاهز! 👍</button>
            </div>

            <div id="game-board" class="hidden">
                <p id="turn-display" style="font-weight:bold;"></p>
                <div id="top-card" class="uno-card" style="margin: 0 auto; transform: scale(1.3); cursor: default;">?</div>
                <div id="player-hand" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin: 25px 0;"></div>
                <button onclick="drawCardAction()" style="background: var(--accent);">سحب كرت +</button>
            </div>
            
            <div id="chat-area">
                <div id="chat-msgs"></div>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="chat-input" style="flex-grow:1; margin:0; padding:8px;" placeholder="رسالة...">
                    <button onclick="sendMsg()">إرسال</button>
                </div>
            </div>
        </div>
        <button id="uno-btn" onclick="sayUno()">UNO!</button>
    </div>

    <div id="settings-modal" class="modal"><div class="modal-content">
        <h3>الإعدادات</h3>
        <select id="theme-select" onchange="updateTheme()" style="width:100%; padding:10px;">
            <option value="light">وضع النهار ☀️</option>
            <option value="dark">وضع الليل 🌙</option>
        </select>
        <button onclick="closeModal('settings-modal')" style="width:100%; margin-top:10px;">إغلاق</button>
    </div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, push, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCTJA6RtmgNDfusmpQH7Yu5keo8LnB_arE",
            authDomain: "uno-online-c4bb2.firebaseapp.com",
            databaseURL: "https://uno-online-c4bb2-default-rtdb.firebaseio.com",
            projectId: "uno-online-c4bb2",
            storageBucket: "uno-online-c4bb2.firebasestorage.app",
            messagingSenderId: "1077724641787",
            appId: "1:1077724641787:web:302acb78b4ee3f9090735e"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myKey, myRoom, myName, hasUno = false, picking = false;

        window.createRoom = async () => {
            myName = document.getElementById('username').value || "لاعب";
            myRoom = Math.floor(100000 + Math.random() * 900000);
            const pRef = push(ref(db, `rooms/${myRoom}/players`));
            myKey = pRef.key;
            onDisconnect(ref(db, `rooms/${myRoom}`)).remove();
            await set(pRef, { name: myName, ready: false });
            setupGame();
        };

        window.joinRoom = async () => {
            myRoom = document.getElementById('room-input').value;
            myName = document.getElementById('username').value || "لاعب";
            if(!myRoom) return alert("ادخل الكود!");
            const pRef = push(ref(db, `rooms/${myRoom}/players`));
            myKey = pRef.key;
            onDisconnect(ref(db, `rooms/${myRoom}`)).remove();
            await set(pRef, { name: myName, ready: false });
            setupGame();
        };

        function setupGame() {
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            // تحديث عرض رقم الغرفة في الواجهة
            document.getElementById('room-display').innerText = `كود الغرفة: ${myRoom}`;

            onValue(ref(db, `rooms/${myRoom}`), (s) => {
                const data = s.val(); if(!data) return location.reload();
                const players = data.players || {};
                const tags = document.getElementById('players-tags'); tags.innerHTML = "";
                const isTurnKey = data.game ? data.game.order[data.game.turn] : null;
                Object.keys(players).forEach(k => {
                    const active = k === isTurnKey ? "active-turn" : "";
                    tags.innerHTML += `<span class="player-tag ${active}">${players[k].name}</span>`;
                });
                if(Object.values(players).length >= 2 && Object.values(players).every(p => p.ready) && !data.game) initDeck(Object.keys(players));
                if(data.game) renderBoard(data.game);
            });
            onValue(ref(db, `rooms/${myRoom}/chat`), (s) => {
                const msgs = document.getElementById('chat-msgs'); msgs.innerHTML = "";
                if(s.exists()) Object.values(s.val()).forEach(m => msgs.innerHTML += `<div><b>${m.u}:</b> ${m.t}</div>`);
            });
        }

        async function initDeck(keys) {
            if(keys[0] !== myKey) return;
            let deck = [];
            ['red','blue','green','yellow'].forEach(c => {
                for(let i=0; i<=9; i++) deck.push({color:c, value:i.toString()});
                ['+2', 'Skip', '🔄'].forEach(v => deck.push({color:c, value:v}));
            });
            for(let i=0; i<4; i++) { deck.push({color:'black', value:'Wild'}); deck.push({color:'black', value:'+4'}); }
            deck.sort(() => Math.random() - 0.5);
            let game = { discard: [deck.find(c => !isNaN(c.value))], turn: 0, order: keys, deck: deck };
            keys.forEach(k => game[`hand_${k}`] = deck.splice(0, 7));
            await update(ref(db, `rooms/${myRoom}/game`), game);
        }

        function renderBoard(game) {
            document.getElementById('waiting-area').classList.add('hidden');
            document.getElementById('game-board').classList.remove('hidden');
            const top = game.discard[game.discard.length-1];
            const topEl = document.getElementById('top-card');
            topEl.innerText = top.value; topEl.style.background = getC(top.color);
            const hand = game[`hand_${myKey}`] || [];
            const handDiv = document.getElementById('player-hand'); handDiv.innerHTML = "";
            hand.forEach((c, i) => {
                const d = document.createElement('div'); d.className='uno-card'; d.innerText=c.value;
                d.style.background=getC(c.color); d.onclick=() => playCard(i, game);
                handDiv.appendChild(d);
            });
            const isTurn = game.order[game.turn] === myKey;
            document.getElementById('turn-display').innerText = isTurn ? "دورك! 🔥" : "انتظر...";
            document.getElementById('uno-btn').style.display = (hand.length === 2 && isTurn) ? 'block' : 'none';
        }

        async function playCard(idx, game) {
            if(game.order[game.turn] !== myKey || picking) return;
            const card = game[`hand_${myKey}`][idx];
            const top = game.discard[game.discard.length-1];
            if(card.color === top.color || card.value === top.value || card.color === 'black') {
                if(game[`hand_${myKey}`].length === 2 && !hasUno) return alert("UNO!");
                game[`hand_${myKey}`].splice(idx, 1);
                game.discard.push(card);
                let nIdx = (game.turn + 1) % game.order.length;
                let victim = game.order[nIdx];
                if(card.value === '+2') {
                    for(let i=0; i<2; i++) game[`hand_${victim}`].push(game.deck.pop());
                    game.turn = (nIdx + 1) % game.order.length;
                } else if(card.value === 'Skip' || (card.value === '🔄' && game.order.length === 2)) {
                    game.turn = (nIdx + 1) % game.order.length;
                } else if(card.color === 'black') {
                    if(card.value === '+4') for(let i=0; i<4; i++) game[`hand_${victim}`].push(game.deck.pop());
                    picking = true; document.getElementById('color-modal').style.display = 'flex';
                } else { game.turn = nIdx; }
                hasUno = false; await update(ref(db, `rooms/${myRoom}/game`), game);
            }
        }

        window.pickColor = async (color) => {
            const s = await get(ref(db, `rooms/${myRoom}/game`));
            const game = s.val(); const last = game.discard[game.discard.length-1];
            game.discard[game.discard.length-1].color = color;
            game.turn = (last.value === '+4') ? (game.turn + 2) % game.order.length : (game.turn + 1) % game.order.length;
            picking = false; document.getElementById('color-modal').style.display = 'none';
            await update(ref(db, `rooms/${myRoom}/game`), game);
        };

        window.drawCardAction = async () => {
            const s = await get(ref(db, `rooms/${myRoom}/game`));
            const game = s.val(); if(game.order[game.turn] !== myKey) return;
            game[`hand_${myKey}`].push(game.deck.pop());
            game.turn = (game.turn + 1) % game.order.length;
            hasUno = false; await update(ref(db, `rooms/${myRoom}/game`), game);
        };

        window.sendMsg = () => {
            const i = document.getElementById('chat-input');
            if(i.value) push(ref(db, `rooms/${myRoom}/chat`), { u: myName, t: i.value });
            i.value = "";
        };

        window.setReady = () => update(ref(db, `rooms/${myRoom}/players/${myKey}`), { ready: true });
        window.sayUno = () => { hasUno = true; alert("قلت أونو!"); };
        window.openModal = (id) => document.getElementById(id).style.display='flex';
        window.closeModal = (id) => document.getElementById(id).style.display='none';
        window.updateTheme = () => document.getElementById('body-tag').className = document.getElementById('theme-select').value + '-mode';
        function getC(c) { return {red:'#ff4757', blue:'#3498db', green:'#2ecc71', yellow:'#f1c40f', black:'#000'}[c]; }
    </script>
</body>
</html>
