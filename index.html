<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNO Ultimate Pro - نظام الأدمن</title>
    <style>
        :root { --bg: #f8f9fa; --txt: #2d3436; --accent: #ff4757; --surface: #ffffff; --online: #2ecc71; --playing: #3498db; --offline: #95a5a6; }
        .dark-mode { --bg: #1a1a1a; --txt: #dfe6e9; --surface: #2d3436; }
        .colorful-mode { --bg: linear-gradient(45deg, #ff4757, #2ecc71, #3498db, #f1c40f); --txt: #fff; --surface: rgba(255,255,255,0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--txt); font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; transition: 0.3s; padding: 20px; }
        .container { background: var(--surface); border-radius: 30px; padding: 25px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 500px; text-align: center; max-height: 90vh; overflow-y: auto; }
        .hidden { display: none !important; }
        input, button { padding: 12px 15px; border-radius: 15px; border: 2px solid var(--accent); font-size: 1rem; font-family: inherit; width: 100%; transition: 0.3s; margin: 5px 0; }
        input { background: var(--bg); color: var(--txt); text-align: center; }
        button { background: var(--accent); color: white; border: none; cursor: pointer; font-weight: bold; }
        button.secondary { background: transparent; border: 2px solid var(--accent); color: var(--txt); }
        button.success { background: #2ecc71; }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .room-info { background: rgba(0,0,0,0.8); color: gold; padding: 12px; border-radius: 15px; margin-bottom: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .uno-card { width: 60px; cursor: pointer; transition: 0.2s; filter: drop-shadow(0 4px 5px rgba(0,0,0,0.2)); margin: 2px; }
        .uno-card:hover { transform: translateY(-15px) scale(1.1); z-index: 10; }
        #uno-btn { background: #f1c40f; color: black; border: 4px solid white; border-radius: 15px; padding: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; display: none; animation: pulse 1s infinite; }
        @keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1)} }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--surface); padding: 25px; border-radius: 20px; color: var(--txt); width: 90%; max-width: 400px; text-align: center; }
        .player-tag { background: #747d8c; color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; margin: 3px; display: inline-block; }
        .active-turn { background: var(--accent) !important; box-shadow: 0 0 15px var(--accent); transform: scale(1.05); }
        #chat-msgs { height: 80px; overflow-y: auto; font-size: 0.8rem; border: 1px solid var(--accent); margin: 10px 0; text-align: right; background: rgba(0,0,0,0.05); padding: 8px; border-radius: 10px; }
        .friend-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; margin: 8px 0; background: var(--bg); border-radius: 15px; border-right: 4px solid var(--offline); text-align: right; }
        .friend-item.online { border-right-color: var(--online); }
        .nav-buttons { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; justify-content: center; }
        .nav-buttons button { width: auto; padding: 10px 20px; }
        #admin-controls { background: rgba(241, 196, 15, 0.1); padding: 15px; border-radius: 15px; border: 1px dashed #f1c40f; margin-bottom: 10px; }
    </style>
</head>
<body id="body-tag" class="light-mode">

<div class="container" id="auth-screen">
    <h1 style="margin-bottom:20px;">🎴 UNO Online</h1>
    <div id="login-form">
        <input type="email" id="login-email" placeholder="البريد الإلكتروني">
        <input type="password" id="login-password" placeholder="كلمة المرور">
        <div id="login-error" style="color:#ff4757;min-height:20px;font-size:0.85rem;margin:5px 0;"></div>
        <button onclick="login()">دخول</button>
        <button class="secondary" onclick="showRegister()">إنشاء حساب جديد</button>
    </div>
    <div id="register-form" class="hidden">
        <input type="text" id="reg-name" placeholder="اسم المستخدم">
        <input type="email" id="reg-email" placeholder="البريد الإلكتروني">
        <input type="password" id="reg-password" placeholder="كلمة المرور (6 أحرف+)">
        <div id="reg-error" style="color:#ff4757;min-height:20px;font-size:0.85rem;margin:5px 0;"></div>
        <button onclick="register()">إنشاء حساب</button>
        <button class="secondary" onclick="showLogin()">العودة لتسجيل الدخول</button>
    </div>
</div>

<div class="container hidden" id="main-screen">
    <div id="user-info" style="display:flex;justify-content:space-between;align-items:center;background:var(--accent);color:white;padding:10px 20px;border-radius:25px;margin-bottom:20px;">
        <span>👤 <span id="display-name"></span></span>
        <button onclick="logout()" style="width:auto;background:white;color:var(--accent);padding:8px 20px;">خروج</button>
    </div>
    <div class="nav-buttons">
        <button onclick="showMainMenu()" class="success">🏠 الرئيسية</button>
        <button onclick="showFriendsList()" class="secondary">👥 الأصدقاء <span id="req-badge" style="display:none; background:yellow; color:black; border-radius:50%; padding:2px 6px; font-size:0.7rem;">0</span></button>
    </div>

    <div id="main-menu">
        <h1>أونو أونلاين</h1>
        <button onclick="enterRoom('create')">🎯 إنشاء غرفة</button>
        <div style="display:flex;gap:10px;">
            <input type="text" id="room-input" maxlength="6" placeholder="كود الغرفة">
            <button onclick="enterRoom('join')" style="width:auto;">🚪 دخول</button>
        </div>
    </div>

    <div id="friends-menu" class="hidden">
        <h2>👥 الأصدقاء</h2>
        <div style="display:flex;gap:8px;margin-bottom:10px;">
            <input type="text" id="friend-search" placeholder="ابحث بالبريد...">
            <button onclick="searchFriend()" style="width:auto;">🔍</button>
        </div>
        <div id="search-results"></div>
        <div id="friends-list"></div>
        <hr style="margin:15px 0;">
        <h3>📨 الطلبات</h3>
        <div id="requests-list"></div>
    </div>
</div>

<div class="container hidden" id="game-screen">
    <div class="room-info">
        <span id="room-display">Code: ---</span>
        <button onclick="copyRoomLink()" style="width:auto;background:#f1c40f;color:black;padding:5px 10px;">📋 نسخ</button>
    </div>
    <div id="players-tags"></div>

    <div id="waiting-area">
        <p id="wait-msg">⏳ بانتظار الخصوم...</p>
        
        <div id="admin-controls" class="hidden">
            <p style="color:#e67e22; font-size: 0.9rem; margin-bottom: 10px;">أنت أدمن الغرفة. ابدأ اللعبة عندما يجهز الجميع.</p>
            <button onclick="manualStartGame()" class="success">🚀 ابدأ اللعبة الآن</button>
        </div>

        <button onclick="setReady()" id="btn-ready" class="success">👍 أنا جاهز!</button>
    </div>

    <div id="game-board" class="hidden">
        <p id="turn-display" style="font-weight:bold;font-size:1.2rem;margin:15px 0;"></p>
        <img id="top-card" class="uno-card" style="margin:10px auto;cursor:default;" src="cards/r0.png">
        <div id="player-hand" style="overflow-x:auto;white-space:nowrap;padding:20px;background:rgba(0,0,0,0.05);border-radius:15px;margin:15px 0;"></div>
        <div style="display:flex;gap:10px;justify-content:center;">
            <button onclick="drawCardAction()" id="btn-draw">🃏 سحب كرت</button>
            <button id="uno-btn" onclick="sayUno()">⚠️ UNO!</button>
        </div>
    </div>

    <div style="margin-top:15px;">
        <div id="chat-msgs"></div>
        <div style="display:flex;gap:5px;">
            <input type="text" id="chat-input" placeholder="رسالة...">
            <button onclick="sendMsg()" style="width:auto;">📤</button>
        </div>
    </div>
    <button onclick="quitGame()" style="background:#c0392b;margin-top:10px;">🚪 خروج</button>
</div>

<div id="color-modal" class="modal">
    <div class="modal-content">
        <h3>🎨 اختر اللون</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:15px;">
            <div style="height:60px;background:#ff4757;border-radius:10px;" onclick="pickColor('red')"></div>
            <div style="height:60px;background:#3498db;border-radius:10px;" onclick="pickColor('blue')"></div>
            <div style="height:60px;background:#2ecc71;border-radius:10px;" onclick="pickColor('green')"></div>
            <div style="height:60px;background:#f1c40f;border-radius:10px;" onclick="pickColor('yellow')"></div>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, onValue, push, update, onDisconnect, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyCTJA6RtmgNDfusmpQH7Yu5keo8LnB_arE",
    authDomain: "uno-online-c4bb2.firebaseapp.com",
    databaseURL: "https://uno-online-c4bb2-default-rtdb.firebaseio.com",
    projectId: "uno-online-c4bb2",
    storageBucket: "uno-online-c4bb2.firebasestorage.app",
    messagingSenderId: "1077724641787",
    appId: "1:1077724641787:web:302acb78b4ee3f9090735e"
};

const app  = initializeApp(firebaseConfig);
const db   = getDatabase(app);
const auth = getAuth(app);

let currentUser = null, myName = '', myKey = '', myRoom = '', isAdmin = false, hasUno = false, picking = false, prevTurnKey = null;

// --- نظام الأصوات ---
let audioCtx = null;
const initAudio = () => { if(!audioCtx) audioCtx = new(window.AudioContext||window.webkitAudioContext)(); };
function playTone(f, d, type='sine') {
    if(!audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination); o.type = type;
    o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(0.3, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
    o.start(); o.stop(audioCtx.currentTime + d);
}
const soundPlay = () => { initAudio(); playTone(440, 0.1); };
const soundDraw = () => { initAudio(); playTone(330, 0.1, 'sawtooth'); };
const soundTurn = () => { initAudio(); playTone(660, 0.2); };
const soundStart = () => { initAudio(); playTone(523, 0.1); playTone(659, 0.1, 'sine', 0.1); };

// --- المصادقة ---
onAuthStateChanged(auth, async (user) => {
    if (user) {
        currentUser = user;
        myName = user.displayName || user.email.split('@')[0];
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        document.getElementById('display-name').textContent = myName;
        updateUserStatus('online');
        listenFriends();
    } else {
        document.getElementById('auth-screen').classList.remove('hidden');
        document.getElementById('main-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.add('hidden');
    }
});

async function updateUserStatus(status, roomId = null) {
    if (!currentUser) return;
    const r = ref(db, `users/${currentUser.uid}/status`);
    await set(r, { status, roomId, lastSeen: Date.now() });
    onDisconnect(r).set({ status: 'offline', roomId: null, lastSeen: Date.now() });
}

// --- إدارة الغرف واللعب ---
window.enterRoom = async (type) => {
    initAudio();
    myRoom = type === 'create' ? Math.floor(100000 + Math.random() * 899999).toString() : document.getElementById('room-input').value;
    if (myRoom.length !== 6) return alert("كود خطأ");

    const roomRef = ref(db, `rooms/${myRoom}/players`);
    const snap = await get(roomRef);
    const players = snap.val() || {};
    
    // أول شخص يدخل هو الأدمن
    isAdmin = Object.keys(players).length === 0;
    
    const pRef = push(roomRef);
    myKey = pRef.key;
    await set(pRef, { name: myName, uid: currentUser.uid, ready: false, isAdmin: isAdmin });
    onDisconnect(pRef).remove();

    updateUserStatus('playing', myRoom);
    document.getElementById('main-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    document.getElementById('room-display').innerText = `Room: ${myRoom} ${isAdmin ? '(الأدمن)' : ''}`;
    
    listenGame();
};

function listenGame() {
    onValue(ref(db, `rooms/${myRoom}`), (s) => {
        const data = s.val();
        if (!data) return;

        const players = data.players || {};
        const game = data.game;

        // تحديث واجهة الأدمن
        if (isAdmin && !game) {
            document.getElementById('admin-controls').classList.remove('hidden');
        } else {
            document.getElementById('admin-controls').classList.add('hidden');
        }

        // تحديث أسماء اللاعبين
        const tags = document.getElementById('players-tags');
        tags.innerHTML = '';
        Object.entries(players).forEach(([k, p]) => {
            const isTurn = game && game.order[game.turn] === k;
            tags.innerHTML += `<span class="player-tag ${isTurn ? 'active-turn' : ''}">${p.name} ${p.ready ? '✅' : '⏳'}</span> `;
        });

        if (game) {
            if (game.order[game.turn] === myKey && prevTurnKey !== myKey) soundTurn();
            prevTurnKey = game.order[game.turn];
            renderGame(game);
        }
    });

    onValue(ref(db, `rooms/${myRoom}/chat`), (s) => {
        const msgs = document.getElementById('chat-msgs');
        msgs.innerHTML = '';
        if (s.exists()) Object.values(s.val()).forEach(m => msgs.innerHTML += `<div><b>${m.u}:</b> ${m.t}</div>`);
        msgs.scrollTop = msgs.scrollHeight;
    });
}

// دالة بدء اللعبة اليدوية للأدمن
window.manualStartGame = async () => {
    const snap = await get(ref(db, `rooms/${myRoom}/players`));
    const players = snap.val() || {};
    const playerKeys = Object.keys(players);

    if (playerKeys.length < 2) return alert("تحتاج لاعبين على الأقل!");
    if (!Object.values(players).every(p => p.ready)) return alert("يجب أن يكون الجميع جاهزاً (✅) للبدء!");

    soundStart();
    initGameLogic(playerKeys);
};

async function initGameLogic(keys) {
    let deck = [];
    ['red','blue','green','yellow'].forEach(c => {
        for(let i=0; i<=9; i++) deck.push({color:c, value:i.toString()});
        ['Skip','🔄','+2'].forEach(v => { deck.push({color:c, value:v}); deck.push({color:c, value:v}); });
    });
    for(let i=0; i<4; i++) { deck.push({color:'black', value:'Wild'}); deck.push({color:'black', value:'+4'}); }
    deck.sort(() => Math.random() - 0.5);

    let game = {
        deck: deck,
        discard: [deck.pop()],
        order: keys,
        turn: 0,
        winner: null
    };

    keys.forEach(k => game[`hand_${k}`] = game.deck.splice(0, 7));
    await update(ref(db, `rooms/${myRoom}/game`), game);
}

function renderGame(game) {
    if (game.winner) { alert("الفائز: " + game.winner); location.reload(); return; }
    
    document.getElementById('waiting-area').classList.add('hidden');
    document.getElementById('game-board').classList.remove('hidden');
    
    const top = game.discard[game.discard.length - 1];
    document.getElementById('top-card').src = getImg(top);
    
    const handDiv = document.getElementById('player-hand');
    handDiv.innerHTML = '';
    (game[`hand_${myKey}`] || []).forEach((c, i) => {
        const img = document.createElement('img');
        img.src = getImg(c);
        img.className = 'uno-card';
        img.onclick = () => playCard(i, game);
        handDiv.appendChild(img);
    });

    const isMyTurn = game.order[game.turn] === myKey;
    document.getElementById('turn-display').innerText = isMyTurn ? "دورك الآن! 🔥" : "انتظر دور الخصم...";
    document.getElementById('uno-btn').style.display = (game[`hand_${myKey}`].length === 2 && isMyTurn) ? 'block' : 'none';
}

async function playCard(idx, game) {
    if (game.order[game.turn] !== myKey || picking) return;
    const card = game[`hand_${myKey}`][idx];
    const top = game.discard[game.discard.length - 1];

    if (card.color === top.color || card.value === top.value || card.color === 'black') {
        if (game[`hand_${myKey}`].length === 2 && !hasUno) return alert("اضغط UNO أولاً!");
        
        soundPlay();
        game[`hand_${myKey}`].splice(idx, 1);
        game.discard.push(card);

        if (game[`hand_${myKey}`].length === 0) { game.winner = myName; }
        else {
            let next = (game.turn + 1) % game.order.length;
            if (card.value === 'Skip') next = (next + 1) % game.order.length;
            else if (card.value === '🔄') { game.order.reverse(); next = (game.order.indexOf(myKey) + 1) % game.order.length; }
            else if (card.value === '+2') { 
                const victim = game.order[next];
                for(let i=0; i<2; i++) game[`hand_${victim}`].push(game.deck.pop());
                next = (next + 1) % game.order.length;
            }
            
            if (card.color === 'black') {
                picking = true;
                document.getElementById('color-modal').style.display = 'flex';
                await update(ref(db, `rooms/${myRoom}/game`), game);
                return;
            }
            game.turn = next;
        }
        hasUno = false;
        await update(ref(db, `rooms/${myRoom}/game`), game);
    }
}

window.pickColor = async (color) => {
    const snap = await get(ref(db, `rooms/${myRoom}/game`));
    let game = snap.val();
    game.discard[game.discard.length-1].color = color;
    game.turn = (game.turn + 1) % game.order.length;
    picking = false;
    document.getElementById('color-modal').style.display = 'none';
    await update(ref(db, `rooms/${myRoom}/game`), game);
};

window.drawCardAction = async () => {
    const snap = await get(ref(db, `rooms/${myRoom}/game`));
    let game = snap.val();
    if (game.order[game.turn] !== myKey) return;
    
    soundDraw();
    game[`hand_${myKey}`].push(game.deck.pop());
    game.turn = (game.turn + 1) % game.order.length;
    hasUno = false;
    await update(ref(db, `rooms/${myRoom}/game`), game);
};

// المساعدات
function getImg(c) {
    if(c.value === 'Wild') return 'cards/wild.png';
    if(c.value === '+4') return 'cards/+4.png';
    const colors = {red:'r', blue:'b', green:'g', yellow:'y'};
    const vals = {Skip:'s', '🔄':'r', '+2':'+2'};
    return `cards/${colors[c.color] || c.color}${vals[c.value] || c.value}.png`;
}

window.setReady = () => {
    initAudio();
    update(ref(db, `rooms/${myRoom}/players/${myKey}`), { ready: true });
    document.getElementById('btn-ready').style.display = 'none';
};

window.sendMsg = () => {
    const inp = document.getElementById('chat-input');
    if (inp.value) {
        push(ref(db, `rooms/${myRoom}/chat`), { u: myName, t: inp.value });
        inp.value = '';
    }
};

window.copyRoomLink = () => {
    navigator.clipboard.writeText(myRoom);
    alert("تم نسخ كود الغرفة: " + myRoom);
};

// تسجيل الدخول والوظائف الأخرى (نفس الكود السابق لديك)
window.login = async () => { /* ... كود تسجيل الدخول ... */ 
    const e = document.getElementById('login-email').value, p = document.getElementById('login-password').value;
    try { await signInWithEmailAndPassword(auth, e, p); } catch(err) { alert(err.message); }
};
window.register = async () => {
    const n = document.getElementById('reg-name').value, e = document.getElementById('reg-email').value, p = document.getElementById('reg-password').value;
    try { 
        const res = await createUserWithEmailAndPassword(auth, e, p);
        await updateProfile(res.user, {displayName: n});
        await set(ref(db, `users/${res.user.uid}`), {name: n, email: e});
    } catch(err) { alert(err.message); }
};
window.logout = () => signOut(auth);
window.showRegister = () => { document.getElementById('login-form').classList.add('hidden'); document.getElementById('register-form').classList.remove('hidden'); };
window.showLogin = () => { document.getElementById('register-form').classList.add('hidden'); document.getElementById('login-form').classList.remove('hidden'); };
window.sayUno = () => { hasUno = true; sendMsg("⚠️ UNO!"); };
window.quitGame = () => location.reload();
window.showMainMenu = () => { document.getElementById('main-menu').classList.remove('hidden'); document.getElementById('friends-menu').classList.add('hidden'); };
window.showFriendsList = () => { document.getElementById('main-menu').classList.add('hidden'); document.getElementById('friends-menu').classList.remove('hidden'); };

function listenFriends() { /* نظام الأصدقاء المبسط */ }
</script>
</body>
</html>
