<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO Pro - Revenge Edition</title>
    <style>
        :root { --bg-color: #f0f0f0; --text-color: #333; --accent: #ff4757; --btn-bg: #2f3542; --btn-text: white; }
        .dark-mode { --bg-color: #1a1a1a; --text-color: #f1f1f1; --btn-bg: #374151; }
        body { background: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; transition: 0.3s; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { text-align: center; width: 95%; max-width: 600px; display: flex; flex-direction: column; justify-content: center; }
        .uno-card { width: 45px; height: 70px; border-radius: 8px; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; color: white; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .uno-card:hover { transform: translateY(-10px); }
        #uno-btn { background: gold; color: black; border: 3px solid white; border-radius: 50%; width: 55px; height: 55px; font-weight: bold; position: fixed; bottom: 80px; right: 20px; display: none; cursor: pointer; animation: pulse 1s infinite; z-index: 100; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .hidden { display: none !important; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; color: #333; width: 85%; max-width: 380px; text-align: center; }
        button { padding: 10px 20px; margin: 5px; border: none; border-radius: 25px; background: var(--btn-bg); color: var(--btn-text); cursor: pointer; font-weight: bold; }
        input { padding: 12px; border-radius: 20px; border: 2px solid var(--accent); text-align: center; margin-bottom: 10px; width: 80%; }
        #chat-area { background: rgba(0,0,0,0.1); border-radius: 15px; padding: 10px; margin-top: 15px; }
        #chat-msgs { height: 60px; overflow-y: auto; font-size: 0.8rem; text-align: right; border-bottom: 1px solid #ccc; margin-bottom: 5px; }
        .player-tag { background: var(--accent); color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; margin: 2px; display: inline-block; }
        .color-picker { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .cp-btn { height: 45px; border-radius: 10px; border: 3px solid white; cursor: pointer; }
    </style>
</head>
<body class="light-mode" id="body-tag">

    <div id="color-modal" class="modal">
        <div class="modal-content">
            <h3 id="cp-title">اختر اللون الجديد</h3>
            <div class="color-picker">
                <div class="cp-btn" style="background:#ff4757" onclick="pickColor('red')"></div>
                <div class="cp-btn" style="background:#3498db" onclick="pickColor('blue')"></div>
                <div class="cp-btn" style="background:#2ecc71" onclick="pickColor('green')"></div>
                <div class="cp-btn" style="background:#f1c40f" onclick="pickColor('yellow')"></div>
            </div>
        </div>
    </div>

    <div id="draw-modal" class="modal">
        <div class="modal-content">
            <h3>سحبت كرتًا رائعًا!</h3>
            <p>هل تريد لعبه الآن؟</p>
            <button onclick="confirmDrawn(true)" style="background:#2ecc71">لعب الكرت</button>
            <button onclick="confirmDrawn(false)" style="background:#ff4757">تخطي</button>
        </div>
    </div>

    <div class="container" id="main-screen">
        <h1>أونو أونلاين</h1>
        <input type="text" id="username" placeholder="أدخل اسمك">
        <button onclick="createRoom()">إنشاء غرفة</button><br>
        <input type="text" id="room-input" maxlength="6" placeholder="كود الغرفة">
        <button onclick="joinRoom()">دخول</button><br>
        <button onclick="openModal('settings-modal')">الإعدادات ⚙️</button>
    </div>

    <div class="container hidden" id="game-screen">
        <div style="padding: 15px; border: 3px dashed var(--accent); border-radius: 20px; position: relative;">
            <button style="position:absolute; top:-40px; left:0;" onclick="location.reload()">خروج 🚪</button>
            <div id="players-tags"></div>
            <div id="waiting-area"><button onclick="setReady()">أنا جاهز! 👍</button></div>
            <div id="game-board" class="hidden">
                <p id="turn-display" style="font-weight:bold; color:var(--accent);"></p>
                <div id="top-card" class="uno-card" style="margin: 0 auto; transform: scale(1.3);">?</div>
                <div id="player-hand" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin: 20px 0;"></div>
                <button onclick="drawCardAction()">سحب كرت +</button>
            </div>
            <div id="chat-area">
                <div id="chat-msgs"></div>
                <input type="text" id="chat-input" style="width:65%;" placeholder="...">
                <button onclick="sendMsg()">إرسال</button>
            </div>
        </div>
        <button id="uno-btn" onclick="sayUno()">UNO!</button>
    </div>

    <div id="settings-modal" class="modal"><div class="modal-content">
        <select id="lang-select" onchange="updateUI()"><option value="ar">العربية</option><option value="en">English</option></select>
        <button onclick="closeModal('settings-modal')">حفظ</button>
    </div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, push, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCTJA6RtmgNDfusmpQH7Yu5keo8LnB_arE",
            authDomain: "uno-online-c4bb2.firebaseapp.com",
            databaseURL: "https://uno-online-c4bb2-default-rtdb.firebaseio.com",
            projectId: "uno-online-c4bb2",
            storageBucket: "uno-online-c4bb2.firebasestorage.app",
            messagingSenderId: "1077724641787",
            appId: "1:1077724641787:web:302acb78b4ee3f9090735e"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myKey, myRoom, myName, lastDrawn, hasUno = false, isPicking = false;

        window.createRoom = async () => {
            myName = document.getElementById('username').value || "Player";
            myRoom = Math.floor(100000 + Math.random() * 900000);
            const pRef = push(ref(db, `rooms/${myRoom}/players`));
            myKey = pRef.key;
            onDisconnect(ref(db, `rooms/${myRoom}`)).remove();
            await set(pRef, { name: myName, ready: false });
            setupListeners();
        };

        window.joinRoom = async () => {
            myRoom = document.getElementById('room-input').value;
            myName = document.getElementById('username').value || "Player";
            const pRef = push(ref(db, `rooms/${myRoom}/players`));
            myKey = pRef.key;
            onDisconnect(ref(db, `rooms/${myRoom}`)).remove();
            await set(pRef, { name: myName, ready: false });
            setupListeners();
        };

        function setupListeners() {
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            onValue(ref(db, `rooms/${myRoom}`), (s) => {
                const data = s.val(); if(!data) return location.reload();
                const players = data.players || {};
                const tags = document.getElementById('players-tags');
                tags.innerHTML = ""; Object.values(players).forEach(p => tags.innerHTML += `<span class="player-tag">${p.name}</span>`);
                if(Object.values(players).length >= 2 && Object.values(players).every(p => p.ready) && !data.game) startGame(Object.keys(players));
                if(data.game) render(data.game);
            });
            onValue(ref(db, `rooms/${myRoom}/chat`), (s) => {
                const msgs = document.getElementById('chat-msgs'); msgs.innerHTML = "";
                if(s.exists()) Object.values(s.val()).forEach(m => msgs.innerHTML += `<div><b>${m.u}:</b> ${m.t}</div>`);
            });
        }

        async function startGame(keys) {
            if(keys[0] !== myKey) return;
            let deck = [];
            ['red','blue','green','yellow'].forEach(c => {
                for(let i=0; i<=9; i++) deck.push({color:c, value:i.toString()});
                ['+2', 'Skip', '🔄'].forEach(v => deck.push({color:c, value:v}));
            });
            for(let i=0; i<4; i++) { deck.push({color:'black', value:'Wild'}); deck.push({color:'black', value:'+4'}); }
            deck.sort(() => Math.random() - 0.5);
            let game = { discard: [deck.find(c => !isNaN(c.value))], turn: 0, order: keys, deck: deck };
            keys.forEach(k => game[`hand_${k}`] = deck.splice(0, 7));
            await update(ref(db, `rooms/${myRoom}/game`), game);
        }

        function render(game) {
            document.getElementById('waiting-area').classList.add('hidden');
            document.getElementById('game-board').classList.remove('hidden');
            const top = game.discard[game.discard.length-1];
            const topEl = document.getElementById('top-card');
            topEl.innerText = top.value; topEl.style.background = getC(top.color);
            const hand = game[`hand_${myKey}`] || [];
            const handDiv = document.getElementById('player-hand'); handDiv.innerHTML = "";
            hand.forEach((c, i) => {
                const d = document.createElement('div'); d.className='uno-card'; d.innerText=c.value;
                d.style.background=getC(c.color); d.onclick=() => play(i, game);
                handDiv.appendChild(d);
            });
            const isTurn = game.order[game.turn] === myKey;
            document.getElementById('turn-display').innerText = isTurn ? "دورك! 🔥" : "انتظر...";
            document.getElementById('uno-btn').style.display = (hand.length === 2 && isTurn) ? 'block' : 'none';
        }

        async function play(idx, game) {
            if(game.order[game.turn] !== myKey || isPicking) return;
            const card = game[`hand_${myKey}`][idx];
            const top = game.discard[game.discard.length-1];
            if(card.color === top.color || card.value === top.value || card.color === 'black') {
                if(game[`hand_${myKey}`].length === 2 && !hasUno) return alert("UNO!");
                game[`hand_${myKey}`].splice(idx, 1);
                game.discard.push(card);
                let nextIdx = (game.turn + 1) % game.order.length;
                let victim = game.order[nextIdx];
                if(card.value === '+2') {
                    for(let i=0; i<2; i++) game[`hand_${victim}`].push(game.deck.pop());
                    game.turn = (nextIdx + 1) % game.order.length;
                } else if(card.value === 'Skip') {
                    game.turn = (nextIdx + 1) % game.order.length;
                } else if(card.value === '🔄') {
                    if(game.order.length === 2) game.turn = (nextIdx + 1) % game.order.length;
                    else { game.order.reverse(); game.turn = (game.order.indexOf(myKey) + 1) % game.order.length; }
                } else if(card.color === 'black') {
                    if(card.value === '+4') for(let i=0; i<4; i++) game[`hand_${victim}`].push(game.deck.pop());
                    isPicking = true; document.getElementById('color-modal').style.display = 'flex';
                } else { game.turn = nextIdx; }
                await update(ref(db, `rooms/${myRoom}/game`), game);
            }
        }

        window.pickColor = async (color) => {
            const s = await get(ref(db, `rooms/${myRoom}/game`));
            const game = s.val();
            const last = game.discard[game.discard.length-1];
            game.discard[game.discard.length-1].color = color;
            game.turn = (last.value === '+4') ? (game.turn + 2) % game.order.length : (game.turn + 1) % game.order.length;
            isPicking = false; document.getElementById('color-modal').style.display = 'none';
            await update(ref(db, `rooms/${myRoom}/game`), game);
        };

        window.drawCardAction = async () => {
            const s = await get(ref(db, `rooms/${myRoom}/game`));
            const game = s.val(); if(game.order[game.turn] !== myKey) return;
            const c = game.deck.pop();
            const top = game.discard[game.discard.length-1];
            if(c.color === top.color || c.value === top.value || c.color === 'black') {
                lastDrawn = c; document.getElementById('draw-modal').style.display='flex';
            } else {
                game[`hand_${myKey}`].push(c); game.turn = (game.turn + 1) % game.order.length;
                hasUno = false; await update(ref(db, `rooms/${myRoom}/game`), game);
            }
        };

        window.confirmDrawn = async (p) => {
            const s = await get(ref(db, `rooms/${myRoom}/game`));
            const game = s.val(); document.getElementById('draw-modal').style.display='none';
            if(p) { game.discard.push(lastDrawn); game.turn = (game.turn + 1) % game.order.length; }
            else { game[`hand_${myKey}`].push(lastDrawn); game.turn = (game.turn + 1) % game.order.length; }
            await update(ref(db, `rooms/${myRoom}/game`), game);
        };

        window.sendMsg = () => {
            const i = document.getElementById('chat-input');
            if(i.value) push(ref(db, `rooms/${myRoom}/chat`), { u: myName, t: i.value });
            i.value = "";
        };

        window.setReady = () => update(ref(db, `rooms/${myRoom}/players/${myKey}`), { ready: true });
        window.sayUno = () => { hasUno = true; alert("UNO!"); };
        window.openModal = (id) => document.getElementById(id).style.display='flex';
        window.closeModal = (id) => document.getElementById(id).style.display='none';
        function getC(c) { return {red:'#ff4757', blue:'#3498db', green:'#2ecc71', yellow:'#f1c40f', black:'#000'}[c]; }
    </script>
</body>
</html>
