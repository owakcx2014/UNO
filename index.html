<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNO Ultimate Pro - Fixed & Full</title>
    <style>
        :root { --bg: #f8f9fa; --txt: #2d3436; --accent: #ff4757; }
        .dark-mode { --bg: #1a1a1a; --txt: #dfe6e9; }
        .colorful-mode { --bg: linear-gradient(45deg, #ff4757, #2ecc71, #3498db, #f1c40f); --txt: #fff; }
        
        body { background: var(--bg); color: var(--txt); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; transition: 0.3s; }
        .container { text-align: center; width: 95%; max-width: 550px; position: relative; }
        
        /* البطاقات الديكورية */
        .decor-box { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .card-view { width: 50px; height: 75px; border-radius: 8px; border: 3px solid white; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .room-info { background: rgba(0,0,0,0.8); color: gold; padding: 10px; border-radius: 15px; margin-bottom: 10px; font-weight: bold; }
        
        /* كروت اللعب */
        .uno-card { width: 48px; height: 72px; border-radius: 8px; border: 2px solid white; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; color: white; cursor: pointer; margin: 2px; transition: 0.2s; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .uno-card:hover { transform: translateY(-10px); z-index: 10; border-color: gold; }
        
        /* زر أونو المطور للجوال والآيباد */
        #uno-btn { background: #f1c40f; color: black; border: 4px solid white; border-radius: 15px; width: 100px; height: 50px; font-weight: bold; font-size: 1.2rem; cursor: pointer; display: none; margin: 10px auto; animation: pulse 1s infinite; z-index: 100; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .hidden { display: none !important; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; color: #333; width: 85%; max-width: 400px; text-align: center; max-height: 80vh; overflow-y: auto; }
        
        button { padding: 10px 20px; margin: 5px; border: none; border-radius: 25px; background: #2f3542; color: white; cursor: pointer; font-weight: bold; }
        input { padding: 12px; border-radius: 20px; border: 2px solid var(--accent); text-align: center; width: 80%; margin-bottom: 10px; }
        
        #chat-msgs { height: 70px; overflow-y: auto; font-size: 0.8rem; border-bottom: 1px solid #ddd; margin-bottom: 5px; text-align: right; background: rgba(0,0,0,0.05); }
        .player-tag { background: #747d8c; color: white; padding: 3px 10px; border-radius: 10px; font-size: 0.7rem; margin: 2px; display: inline-block; transition: 0.3s; }
        .active-turn { background: var(--accent) !important; box-shadow: 0 0 10px var(--accent); transform: scale(1.1); }
    </style>
</head>
<body class="light-mode" id="body-tag">

    <div id="color-modal" class="modal">
        <div class="modal-content">
            <h3 id="cp-title">اختر اللون الجديد</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div style="height:50px; background:#ff4757; border-radius:10px; cursor:pointer" onclick="pickColor('red')"></div>
                <div style="height:50px; background:#3498db; border-radius:10px; cursor:pointer" onclick="pickColor('blue')"></div>
                <div style="height:50px; background:#2ecc71; border-radius:10px; cursor:pointer" onclick="pickColor('green')"></div>
                <div style="height:50px; background:#f1c40f; border-radius:10px; cursor:pointer" onclick="pickColor('yellow')"></div>
            </div>
        </div>
    </div>

    <div id="rules-modal" class="modal">
        <div class="modal-content">
            <h2 id="rules-title">قواعد اللعبة كاملة</h2>
            <div id="rules-body" style="text-align: right; font-size: 0.85rem; line-height: 1.6;"></div>
            <button onclick="closeModal('rules-modal')">إغلاق / Close</button>
        </div>
    </div>

    <div class="container" id="main-screen">
        <div class="decor-box">
            <div class="card-view" style="background:#ff4757; transform: rotate(-10deg);">7</div>
            <div class="card-view" style="background:#000; transform: rotate(10deg);">+4</div>
        </div>
        <h1 id="main-title">أونو أونلاين</h1>
        <input type="text" id="username" placeholder="اسمك">
        <button onclick="enterRoom('create')" id="btn-create">إنشاء غرفة</button>
        <br>
        <input type="text" id="room-input" maxlength="6" placeholder="كود الغرفة">
        <button onclick="enterRoom('join')" id="btn-join">دخول</button>
        <div style="margin-top: 20px;">
            <button onclick="openModal('rules-modal')" id="btn-rules">قواعد اللعبة</button>
            <button onclick="openModal('settings-modal')">⚙️</button>
        </div>
    </div>

    <div class="container hidden" id="game-screen">
        <div class="room-info" id="room-display">Code: ---</div>
        <div style="padding: 15px; border: 2px solid var(--accent); border-radius: 20px; background: rgba(255,255,255,0.1);">
            <div id="players-tags"></div>
            
            <div id="waiting-area">
                <p id="wait-msg">بانتظار الخصوم...</p>
                <button onclick="setReady()" id="btn-ready">أنا جاهز! 👍</button>
            </div>

            <div id="game-board" class="hidden">
                <p id="turn-display" style="font-weight:bold;"></p>
                <div id="top-card" class="uno-card" style="margin: 0 auto; transform: scale(1.3); cursor: default;">?</div>
                <div id="player-hand" style="overflow-x: auto; white-space: nowrap; padding: 15px; min-height:90px;"></div>
                <button onclick="drawCardAction()" id="btn-draw" style="background:var(--accent)">سحب كرت +</button>
                <button id="uno-btn" onclick="sayUno()">UNO!</button>
            </div>
            
            <div style="margin-top:10px">
                <div id="chat-msgs"></div>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="chat-input" style="flex-grow:1; margin:0; padding:5px;" placeholder="...">
                    <button onclick="sendMsg()" id="btn-send">إرسال</button>
                </div>
            </div>
        </div>
        <button onclick="quitGame()" id="btn-quit" style="margin-top:15px; background:#c0392b;">خروج 🚪</button>
    </div>

    <div id="settings-modal" class="modal"><div class="modal-content">
        <h3 id="set-title">الإعدادات</h3>
        <label>Language:</label>
        <select id="lang-select" onchange="updateUI()" style="width:100%; padding:10px; margin:10px 0;">
            <option value="ar">العربية</option>
            <option value="en">English</option>
        </select>
        <label>Theme:</label>
        <select id="theme-select" onchange="updateTheme()" style="width:100%; padding:10px; margin:10px 0;">
            <option value="light">Light</option>
            <option value="dark">Dark</option>
            <option value="colorful">Colorful</option>
        </select>
        <button onclick="closeModal('settings-modal')" style="width:100%">OK</button>
    </div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, push, update, onDisconnect, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCTJA6RtmgNDfusmpQH7Yu5keo8LnB_arE",
            authDomain: "uno-online-c4bb2.firebaseapp.com",
            databaseURL: "https://uno-online-c4bb2-default-rtdb.firebaseio.com",
            projectId: "uno-online-c4bb2",
            storageBucket: "uno-online-c4bb2.firebasestorage.app",
            messagingSenderId: "1077724641787",
            appId: "1:1077724641787:web:302acb78b4ee3f9090735e" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const t = {
            ar: {
                main: "أونو أونلاين", user: "اسمك", create: "إنشاء غرفة", join: "دخول", rules: "قواعد اللعبة", quit: "خروج 🚪",
                wait: "بانتظار الخصوم...", ready: "أنا جاهز! 👍", draw: "سحب كرت +", turn: "دورك! 🔥", waitT: "انتظر...",
                rulesBody: "<b>قواعد أونو الكاملة:</b><br>1. يوزع 7 كروت لكل لاعب.<br>2. <b>+2:</b> يسحب الخصم كرتين ويخسر دوره.<br>3. <b>+4:</b> يسحب الخصم 4 كروت ويخسر دوره وتختار اللون.<br>4. <b>🔄:</b> يعكس الاتجاه (أو يتخطى في لاعبين).<br>5. <b>UNO:</b> اضغط الزر قبل لعب كرتك ما قبل الأخير."
            },
            en: {
                main: "UNO ONLINE", user: "Username", create: "Create Room", join: "Join", rules: "Rules", quit: "Quit 🚪",
                wait: "Waiting...", ready: "Ready! 👍", draw: "Draw Card +", turn: "Your Turn! 🔥", waitT: "Wait...",
                rulesBody: "<b>Full UNO Rules:</b><br>1. 7 cards each.<br>2. <b>+2:</b> Draw 2 & skip turn.<br>3. <b>+4:</b> Draw 4, skip & pick color.<br>4. <b>🔄:</b> Change direction.<br>5. <b>UNO:</b> Press before playing your 2nd to last card."
            }
        };

        let myKey, myRoom, myName, isAdmin = false, hasUno = false, picking = false;

        window.updateUI = () => {
            const l = document.getElementById('lang-select').value;
            document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('main-title').innerText = t[l].main;
            document.getElementById('username').placeholder = t[l].user;
            document.getElementById('btn-create').innerText = t[l].create;
            document.getElementById('btn-join').innerText = t[l].join;
            document.getElementById('btn-rules').innerText = t[l].rules;
            document.getElementById('rules-title').innerText = t[l].rules;
            document.getElementById('rules-body').innerHTML = t[l].rulesBody;
            document.getElementById('btn-quit').innerText = t[l].quit;
        };

        window.enterRoom = async (type) => {
            myName = document.getElementById('username').value || "Player";
            myRoom = type === 'create' ? Math.floor(100000 + Math.random() * 899999) : document.getElementById('room-input').value;
            if(!myRoom) return;

            const roomRef = ref(db, `rooms/${myRoom}/players`);
            const snap = await get(roomRef);
            const players = snap.val() || {};
            
            // منع تكرار الأسماء
            Object.values(players).forEach(p => { if(p.name === myName) myName += "#" + Math.floor(Math.random()*99); });

            const pRef = push(roomRef);
            myKey = pRef.key;
            isAdmin = Object.keys(players).length === 0;

            await set(pRef, { name: myName, ready: false, isAdmin: isAdmin });
            onDisconnect(ref(db, `rooms/${myRoom}/players/${myKey}`)).remove();
            
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('room-display').innerText = `Room: ${myRoom} ${isAdmin ? '(Admin)' : ''}`;
            listen();
        };

        function listen() {
            onValue(ref(db, `rooms/${myRoom}`), (s) => {
                const data = s.val(); if(!data) return location.reload();
                const players = data.players || {};
                const tags = document.getElementById('players-tags'); tags.innerHTML = "";
                const turnKey = data.game ? data.game.order[data.game.turn] : null;
                Object.keys(players).forEach(k => {
                    const active = k === turnKey ? 'active-turn' : '';
                    tags.innerHTML += `<span class="player-tag ${active}">${players[k].name}</span>`;
                });
                if(Object.values(players).length >= 2 && Object.values(players).every(p => p.ready) && !data.game) initGame(Object.keys(players));
                if(data.game) render(data.game);
            });
            onValue(ref(db, `rooms/${myRoom}/chat`), (s) => {
                const msgs = document.getElementById('chat-msgs'); msgs.innerHTML = "";
                if(s.exists()) Object.values(s.val()).forEach(m => msgs.innerHTML += `<div><b>${m.u}:</b> ${m.t}</div>`);
                msgs.scrollTop = msgs.scrollHeight;
            });
        }

        async function initGame(keys) {
            if(!isAdmin) return;
            let deck = [];
            ['red','blue','green','yellow'].forEach(c => {
                for(let i=0; i<=9; i++) deck.push({color:c, value:i.toString()});
                ['+2', 'Skip', '🔄'].forEach(v => deck.push({color:c, value:v}));
            });
            for(let i=0; i<4; i++) { deck.push({color:'black', value:'Wild'}); deck.push({color:'black', value:'+4'}); }
            deck.sort(() => Math.random() - 0.5);
            let game = { discard: [deck.find(c => !isNaN(c.value))], turn: 0, order: keys, deck: deck, winner: null };
            keys.forEach(k => game[`hand_${k}`] = deck.splice(0, 7));
            await update(ref(db, `rooms/${myRoom}/game`), game);
        }

        function render(game) {
            if(game.winner) { alert("WINNER: " + game.winner); location.reload(); return; }
            document.getElementById('waiting-area').classList.add('hidden');
            document.getElementById('game-board').classList.remove('hidden');
            const top = game.discard[game.discard.length-1];
            const topEl = document.getElementById('top-card');
            topEl.innerText = top.value; topEl.style.background = getC(top.color);
            const hand = game[`hand_${myKey}`] || [];
            const handDiv = document.getElementById('player-hand'); handDiv.innerHTML = "";
            hand.forEach((c, i) => {
                const d = document.createElement('div'); d.className='uno-card'; d.innerText=c.value;
                d.style.background=getC(c.color); d.onclick=() => play(i, game);
                handDiv.appendChild(d);
            });
            const isTurn = game.order[game.turn] === myKey;
            document.getElementById('turn-display').innerText = isTurn ? "Your Turn!" : "Wait...";
            document.getElementById('uno-btn').style.display = (hand.length === 2 && isTurn) ? 'block' : 'none';
        }

        async function play(idx, game) {
            if(game.order[game.turn] !== myKey || picking) return;
            const card = game[`hand_${myKey}`][idx];
            const top = game.discard[game.discard.length-1];
            if(card.color === top.color || card.value === top.value || card.color === 'black') {
                if(game[`hand_${myKey}`].length === 2 && !hasUno) return alert("Press UNO!");
                game[`hand_${myKey}`].splice(idx, 1);
                game.discard.push(card);
                if(game[`hand_${myKey}`].length === 0) { game.winner = myName; return await update(ref(db, `rooms/${myRoom}/game`), game); }

                let nextIdx = (game.turn + 1) % game.order.length;
                let victim = game.order[nextIdx];
                if(card.value === '+2') {
                    for(let i=0; i<2; i++) game[`hand_${victim}`].push(game.deck.pop());
                    game.turn = (nextIdx + 1) % game.order.length;
                } else if(card.value === 'Skip') {
                    game.turn = (nextIdx + 1) % game.order.length;
                } else if(card.value === '🔄') {
                    game.order.reverse(); game.turn = (game.order.indexOf(myKey) + 1) % game.order.length;
                } else if(card.color === 'black') {
                    if(card.value === '+4') for(let i=0; i<4; i++) game[`hand_${victim}`].push(game.deck.pop());
                    picking = true; document.getElementById('color-modal').style.display='flex';
                } else { game.turn = nextIdx; }
                hasUno = false; await update(ref(db, `rooms/${myRoom}/game`), game);
            }
        }

        window.pickColor = async (color) => {
            const s = await get(ref(db, `rooms/${myRoom}/game`));
            const game = s.val(); const last = game.discard[game.discard.length-1];
            game.discard[game.discard.length-1].color = color;
            game.turn = (last.value === '+4') ? (game.turn + 2) % game.order.length : (game.turn + 1) % game.order.length;
            picking = false; document.getElementById('color-modal').style.display='none';
            await update(ref(db, `rooms/${myRoom}/game`), game);
        };

        window.drawCardAction = async () => {
            const s = await get(ref(db, `rooms/${myRoom}/game`));
            const game = s.val(); if(game.order[game.turn] !== myKey) return;
            game[`hand_${myKey}`].push(game.deck.pop());
            game.turn = (game.turn + 1) % game.order.length;
            hasUno = false; await update(ref(db, `rooms/${myRoom}/game`), game);
        };

        window.quitGame = async () => {
            if(isAdmin) { if(confirm("أنت الأدمن، إغلاق الغرفة؟")) await remove(ref(db, `rooms/${myRoom}`)); }
            else { await remove(ref(db, `rooms/${myRoom}/players/${myKey}`)); location.reload(); }
        };

        window.sayUno = () => { hasUno = true; sendMsg("قُلت UNO! 📢"); };
        window.sendMsg = (txt) => {
            const i = document.getElementById('chat-input');
            const msg = txt || i.value;
            if(msg) push(ref(db, `rooms/${myRoom}/chat`), { u: myName, t: msg });
            i.value = "";
        };

        window.setReady = () => update(ref(db, `rooms/${myRoom}/players/${myKey}`), { ready: true });
        window.openModal = (id) => document.getElementById(id).style.display='flex';
        window.closeModal = (id) => document.getElementById(id).style.display='none';
        window.updateTheme = () => document.getElementById('body-tag').className = document.getElementById('theme-select').value + '-mode';
        function getC(c) { return {red:'#ff4757', blue:'#3498db', green:'#2ecc71', yellow:'#f1c40f', black:'#000'}[c]; }
        updateUI();
    </script>
</body>
</html>
